name: Repository Validation

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  public-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install locked dependencies
        run: npm ci
      - name: Repository checks
        run: npm run repo:all
      - name: Assert public status
        run: npm run assert:public-status
      - name: Compile contracts
        run: npm run compile
      - name: Unit tests
        run: npm test
      - name: Full supported Hardhat test suite
        run: npm run test:all
      - name: Static/security checks without secrets
        run: npm run static-check
      - name: Deterministic local rehearsal
        run: npm run local:authorization-rehearsal
      - name: Public-only authorization check
        run: npm run mainnet:authorization-check:public
