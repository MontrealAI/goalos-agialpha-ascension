name: Repository Validation

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  static-repository-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install locked dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Unit tests
        run: npm test

      - name: Check no obvious secrets / unsafe claims
        run: python scripts/repository_safety_check.py

      - name: Validate repository status files
        run: python scripts/repository_status_check.py

      - name: Production continuation readiness check
        run: python scripts/repository_production_readiness_check.py

      - name: No private operator data check
        run: python scripts/no_private_operator_data_check.py
