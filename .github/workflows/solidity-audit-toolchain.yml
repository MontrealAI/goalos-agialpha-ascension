name: Solidity Audit Toolchain
on:
  pull_request:
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
      - run: npm run compile
      - run: npm test
      - run: npm run audit:all
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-reports
          path: audit/reports/**
