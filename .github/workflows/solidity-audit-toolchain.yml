name: Solidity Audit Toolchain
on:
  pull_request:
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npm run audit:all
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: audit-reports
          path: audit/reports/**
