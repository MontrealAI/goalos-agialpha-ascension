name: Solidity Audit Toolchain
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run repo:all
      - run: npm run compile
      - run: npm test
      - name: Slither-first automated/internal security toolchain
        run: npm run audit:all
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: audit-reports
          path: audit/reports/**
