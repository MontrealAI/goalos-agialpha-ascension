name: Ethereum Sepolia Rehearsal (Public Local Simulation)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-rehearsal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run repo:all
      - run: npm run compile
      - name: Deterministic local authorization rehearsal (no RPC, no keys, no private addresses)
        run: npm run local:authorization-rehearsal
      - name: Public-only authorization check (PRIVATE_OPERATOR_EVIDENCE_PENDING is expected)
        run: npm run mainnet:authorization-check:public
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: local-authorization-rehearsal-public-evidence
          path: |
            deployments/local.agialpha.latest.json
            evidence/local/**
            qa/local-rehearsal-report.json
            docs/ETHEREUM_MAINNET_AUTHORIZATION_DECISION.*
