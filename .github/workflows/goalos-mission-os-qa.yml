name: GoalOS Mission OS QA
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python -m pytest test/mission_os
      - run: npm run mission-os:all
