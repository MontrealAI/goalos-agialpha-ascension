            padding: 0;
          }

          .mesh {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            opacity: .58;
          }

          .shell {
            width: min(1220px, calc(100% - 36px));
            margin: 0 auto;
          }

          .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid rgba(255,255,255,.12);
            background: rgba(3, 6, 20, .76);
