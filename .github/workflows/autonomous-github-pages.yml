name: Premium Autonomous GitHub Pages Website
on:
  push:
    branches: [ main ]
    paths:
      - "scripts/build_goalos_agialpha_final_main_website_v47.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v47.py"
      - ".github/workflows/autonomous-github-pages.yml"
  workflow_dispatch:
concurrency:
  group: premium-autonomous-github-pages
  cancel-in-progress: false
permissions: {}
jobs:
  build:
    name: Build Mission OS world launch website v47
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build final main website
        run: python3 scripts/build_goalos_agialpha_final_main_website_v47.py --out site
      - name: Verify final main website
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v47.py --site site
      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files."
            exit 1
          fi
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    name: Deploy final website to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
