          (() => {
            const canvas = document.querySelector(".mesh");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            let w, h, dpr, points;

            function resize() {
              dpr = Math.min(window.devicePixelRatio || 1, 2);
              w = canvas.width = Math.floor(window.innerWidth * dpr);
              h = canvas.height = Math.floor(window.innerHeight * dpr);
              canvas.style.width = window.innerWidth + "px";
              canvas.style.height = window.innerHeight + "px";
              points = Array.from({ length: Math.min(95, Math.floor(window.innerWidth / 15)) }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.18 * dpr,
                vy: (Math.random() - 0.5) * 0.18 * dpr,
                r: (Math.random() * 2.2 + 0.8) * dpr
              }));
            }

            function frame() {
              ctx.clearRect(0, 0, w, h);
              for (const p of points) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,214,107,.42)";
                ctx.fill();
              }

              for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                  const a = points[i], b = points[j];
                  const dx = a.x - b.x, dy = a.y - b.y;
                  const dist = Math.sqrt(dx * dx + dy * dy);
                  if (dist < 150 * dpr) {
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.strokeStyle = `rgba(99,232,255,${0.12 * (1 - dist / (150 * dpr))})`;
                    ctx.lineWidth = 1 * dpr;
                    ctx.stroke();
                  }
                }
              }
              requestAnimationFrame(frame);
            }

            window.addEventListener("resize", resize, { passive: true });
            resize();
            frame();
          })();
          """

