          }

          .eyebrow::before {
            content: "";
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 18px rgba(255,214,107,.70);
          }

          h1 {
            max-width: 860px;
            margin: 18px 0 16px;
            font-size: clamp(46px, 8vw, 96px);
            line-height: .92;
            letter-spacing: -.065em;
          }

          h2 {
            margin: 0 0 18px;
            font-size: clamp(28px, 4.2vw, 52px);
            line-height: 1.02;
            letter-spacing: -.045em;
          }

          h3 {
            margin: 0 0 10px;
            font-size: 21px;
            letter-spacing: -.02em;
          }

          .subtitle {
