              ("docs/START_HERE_MAINNET.md", "Start Here: Mainnet"),
              ("docs/PUBLIC_MAINNET_AUTHORIZATION_RUNBOOK.md", "Public Mainnet Authorization Runbook"),
              ("docs/BRANCH_PROTECTION_NEXT_ACTION.md", "Branch Protection Next Action"),
              ("docs/RELEASE_NOTES_MAINNET_AUTHORIZATION_v4_4_0.md", "Mainnet Authorization Release Notes"),
              ("docs/RELEASE_NOTES_SOVEREIGN_RSI_v6_3.md", "Sovereign RSI Release Notes"),
              ("audit/TOOLCHAIN_CLEARANCE_REPORT.md", "Toolchain Clearance Report"),
          ]

          for src, label in doc_links:
              if exists(src):
                  docs_rows += f"""
                  <div class="doc-card">
                    <div>
                      <strong>{esc(label)}</strong>
                      <small>{esc(src)}</small>
                    </div>
                    <a href="{esc(rel_github(src))}">GitHub</a>
                  </div>
                  """

          evidence_body = f"""
          <section class="hero">
            <div class="hero-card">
              <div class="eyebrow">Evidence room</div>
              <h1>Public-safe proof surfaces</h1>
              <p class="subtitle">
                This page links the public certificate, decision files, QA manifests, token verification,
                branch-protection/risk evidence, and security toolchain reports.
              </p>
            </div>
          </section>

          <section class="section">
            <div class="section-header">
              <div>
                <div class="eyebrow">Copied into website artifact</div>
                <h2>Evidence artifacts</h2>
              </div>
              <p>Each copied artifact includes a SHA-256 prefix for basic integrity visibility.</p>
            </div>
            <div class="doc-list">{evidence_rows or "<p class='muted'>No evidence artifacts were copied.</p>"}</div>
          </section>

          <section class="section">
            <div class="section-header">
              <div>
                <div class="eyebrow">Repository documentation</div>
                <h2>Key public documents</h2>
              </div>
              <p>These links open the authoritative source files in GitHub.</p>
            </div>
            <div class="doc-list">{docs_rows or "<p class='muted'>No documentation links found.</p>"}</div>
          </section>
          """
          write_page("evidence.html", "Evidence Room", evidence_body)

          release_body = f"""
          <section class="hero">
            <div class="hero-card">
              <div class="eyebrow">Release readiness</div>
              <h1>Public authorization without overclaim</h1>
              <p class="subtitle">
                Release readiness means the repository package is coherent, evidence-backed, and gated.
                It does not mean Ethereum Mainnet deployment has occurred.
              </p>
            </div>
          </section>

          <section class="section">
            <div class="grid">
              <article class="card wide lux">
                <h2>Mainnet authorization release</h2>
                <p><strong>Target tag:</strong> <code>mainnet-authorization-v4.4.0</code></p>
                <p>
                  Authorized for manual, local, gated Ethereum Mainnet deployment if the certificate remains valid,
                  runtime RPC/key are supplied locally, and typed confirmation is provided.
                </p>
              </article>
              <article class="card">
                <h3>Sovereign RSI paper release</h3>
                <p><strong>Target tag:</strong> <code>sovereign-rsi-v6.3</code></p>
                <p>Publishes Markdown, PDF, DOCX, TeX, checksums, and asset manifest.</p>
              </article>
              <article class="card">
                <h3>Not claimed</h3>
                <p>No external audit completion, no legal/tax/security approval, no guaranteed security, no token classification guarantee, no investment return, and no deployment claim.</p>
              </article>
              <article class="card">
                <h3>Runtime boundary</h3>
                <p>GitHub contains no private key, no RPC secret, no wallet seed, and no private deployment ceremony details.</p>
              </article>
              <article class="card">
                <h3>Next manual command</h3>
                <pre><code>npm run deploy:ethereum-mainnet:gated</code></pre>
              </article>
            </div>
          </section>
          """
          write_page("release.html", "Release Readiness", release_body)

          not_found = """
          <section class="hero">
            <div class="hero-card">
              <div class="eyebrow">404</div>
              <h1>Page not found</h1>
              <p class="subtitle">Return to the GoalOS AGIALPHA Ascension homepage.</p>
              <div class="actions"><a class="button primary" href="index.html">Go home</a></div>
            </div>
          </section>
          """
          write_page("404.html", "Page not found", not_found)

          sitemap = f"""<?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url><loc>{SITE_URL}</loc></url>
            <url><loc>{SITE_URL}sovereign-rsi.html</loc></url>
            <url><loc>{SITE_URL}paper.html</loc></url>
            <url><loc>{SITE_URL}authorization.html</loc></url>
            <url><loc>{SITE_URL}evidence.html</loc></url>
            <url><loc>{SITE_URL}release.html</loc></url>
          </urlset>
          """
          write_text("sitemap.xml", sitemap)

          robots = f"""User-agent: *
          Allow: /

          Sitemap: {SITE_URL}sitemap.xml
          """
          write_text("robots.txt", robots)

          manifest = {
              "name": PROJECT,
              "short_name": "GoalOS AGIALPHA",
              "start_url": SITE_URL,
              "display": "standalone",
              "background_color": "#060b1b",
              "theme_color": "#060b1b",
              "description": "GoalOS-native alpha-AGI Ascension using AGIALPHA",
          }
          write_text("site.webmanifest", json.dumps(manifest, indent=2))

          write_text(".nojekyll", "")

          build_report = {
              "generatedAt": generated_at,
              "project": PROJECT,
              "siteUrl": SITE_URL,
              "paperAssetsCopied": len(paper_assets),
              "evidenceArtifactsCopied": len(copied_evidence),
              "technicalMainnetReady": norm(technical_ready),
              "mainnetDeploymentAuthorized": norm(deployment_authorized),
              "ethereumMainnetAuthorized": norm(ethereum_authorized),
              "ethereumMainnetDeployed": norm(mainnet_deployed),
              "agialphaToken": AGIALPHA_TOKEN,
              "claimBoundary": {
                  "achievedAGI": False,
                  "achievedASI": False,
                  "empiricalSOTA": False,
                  "legalApproval": False,
                  "taxApproval": False,
                  "securityApproval": False,
                  "guaranteedEconomicReturn": False,
                  "kardashevTypeIIAchieved": False
              }
          }
          write_text("evidence/site-build-report.json", json.dumps(build_report, indent=2))

          print("Premium autonomous GitHub Pages website built successfully.")
          print(f"Output: {OUT.resolve()}")
          print(f"HTML pages: {len(list(OUT.glob('*.html')))}")
          print(f"Paper assets copied: {len(paper_assets)}")
          print(f"Evidence artifacts copied: {len(copied_evidence)}")
          PY

      - name: Add GoalOS AGIALPHA usage example to website
        shell: bash
        run: |
          python3 scripts/add_goalos_usage_example_to_site.py --site site

      - name: Validate generated website artifact
        shell: bash
        run: |
          test -f site/index.html
          test -f site/paper.html
          test -f site/authorization.html
          test -f site/evidence.html
          test -f site/release.html
          test -f site/usage-example.html
          test -f site/proof-card-001.html
          test -f site/data/usage-example-proof-card-001.json
          test -f site/assets/site.css
          test -f site/assets/site.js
          test -f site/.nojekyll

          if grep -RniE "PRIVATE_KEY|SEED_PHRASE|MNEMONIC|MAINNET_RPC_URL=|SEPOLIA_RPC_URL=|DEPLOYER_PRIVATE_KEY" site; then
            echo "Potential secret-like text found in generated website."
            exit 1
          fi

          echo "Generated website artifact validated."

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy premium website to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
