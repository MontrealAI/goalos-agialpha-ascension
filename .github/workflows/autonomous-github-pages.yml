name: Premium Autonomous GitHub Pages Website

on:
  push:
    branches: [ main ]
    paths:
      - "site-assets/main-website-v34/**"
      - "data/onboarding/**"
      - "data/proof-cards/**"
      - "docs/onboarding/**"
      - "scripts/build_goalos_agialpha_complete_main_website_v34.py"
      - "scripts/verify_goalos_agialpha_complete_main_website_v34.py"
      - ".github/workflows/autonomous-github-pages.yml"
  workflow_dispatch:

concurrency:
  group: premium-autonomous-github-pages
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build complete GoalOS main website
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build complete main website
        run: python3 scripts/build_goalos_agialpha_complete_main_website_v34.py --site site
      - name: Verify complete main website
        run: python3 scripts/verify_goalos_agialpha_complete_main_website_v34.py --site site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    name: Deploy complete GoalOS main website
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
