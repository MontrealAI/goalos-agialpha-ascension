name: Premium Autonomous GitHub Pages Website

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - "scripts/add_goalos_agialpha_main_site_proof_cards_v14.py"
      - "scripts/verify_goalos_agialpha_main_site_proof_cards_v14.py"
      - "docs/examples/**"
      - "data/examples/**"
      - "evidence/examples/**"
      - "assets/**"
      - ".github/workflows/autonomous-github-pages.yml"

concurrency:
  group: goalos-agialpha-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build canonical main website with proof cards
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build existing website foundation
        run: |
          mkdir -p site
          if [ -d app ]; then
            cp -R app/. site/
          elif [ -f index.html ]; then
            cp index.html site/index.html
          else
            echo "No existing app/index.html or root index.html found" >&2
            exit 1
          fi

      - name: Add Proof Cards 001-008 to main website
        run: python3 scripts/add_goalos_agialpha_main_site_proof_cards_v14.py --site site

      - name: Verify main website proof cards
        run: python3 scripts/verify_goalos_agialpha_main_site_proof_cards_v14.py --site site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
