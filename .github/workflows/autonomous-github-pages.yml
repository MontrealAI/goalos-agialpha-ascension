name: Premium Autonomous GitHub Pages Website

on:
  push:
    branches: [ main ]
    paths:
      - "site-assets/main-website-v40/**"
      - "scripts/build_goalos_agialpha_final_main_website_v40.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v40.py"
      - ".github/workflows/autonomous-github-pages.yml"
  workflow_dispatch:

concurrency:
  group: premium-autonomous-github-pages
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build final WOW website v40
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build final WOW main website
        run: python3 scripts/build_goalos_agialpha_final_main_website_v40.py --out site
      - name: Verify final WOW main website
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v40.py --site site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    name: Deploy final WOW website to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
