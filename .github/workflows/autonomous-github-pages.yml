name: Premium Autonomous GitHub Pages Website

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "README.md"
      - "docs/**"
      - "data/**"
      - "evidence/**"
      - "assets/**"
      - "LOCAL_QA_SITE/**"
      - "scripts/add_goalos_agialpha_main_site_proof_cards_v15.py"
      - "scripts/verify_goalos_agialpha_main_site_proof_cards_v15.py"
      - ".github/workflows/autonomous-github-pages.yml"

concurrency:
  group: premium-autonomous-github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify main website with Proof Cards 001-009
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build main website with Proof Cards 001-009
        run: python3 scripts/add_goalos_agialpha_main_site_proof_cards_v15.py --site site --allow-bootstrap
      - name: Verify main website proof cards
        run: python3 scripts/verify_goalos_agialpha_main_site_proof_cards_v15.py --site site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    name: Deploy main website to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
