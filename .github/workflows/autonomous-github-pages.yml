name: Premium Autonomous GitHub Pages Website

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "qa/**"
      - "audit/**"
      - "deployments/**"
      - "package.json"
      - "docs/examples/**"
      - "data/examples/**"
      - "scripts/add_goalos_usage_example_to_site.py"
      - ".github/workflows/autonomous-github-pages.yml"
  workflow_dispatch:

concurrency:
  group: premium-autonomous-github-pages
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build premium autonomous website
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build premium static website from repository evidence
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import datetime
          import hashlib
          import html
          import json
          import re
          import shutil

          ROOT = Path(".")
          OUT = Path("site")
          ASSETS = OUT / "assets"
          PAPER_OUT = OUT / "papers" / "sovereign-rsi" / "v6.3"
          EVIDENCE_OUT = OUT / "evidence"

          REPO_URL = "https://github.com/MontrealAI/goalos-agialpha-ascension"
          SITE_URL = "https://montrealai.github.io/goalos-agialpha-ascension/"
          AGIALPHA_TOKEN = "0xA61a3B3a130a9c20768EEBF97E21515A6046a1fA"
          PROJECT = "GoalOS AGIALPHA Ascension"
          PAPER_TITLE = "GoalOS-native alpha-AGI Ascension using AGIALPHA"
          PAPER_EDITION = "Sovereign RSI Edition v6.3"

          if OUT.exists():
              shutil.rmtree(OUT)

          OUT.mkdir(parents=True, exist_ok=True)
          ASSETS.mkdir(parents=True, exist_ok=True)
          PAPER_OUT.mkdir(parents=True, exist_ok=True)
          EVIDENCE_OUT.mkdir(parents=True, exist_ok=True)

          generated_at = datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"

          def path(pathlike):
              return ROOT / pathlike

          def exists(pathlike):
              return path(pathlike).exists()

          def read_text(pathlike, default=""):
              p = path(pathlike)
              if not p.exists():
                  return default
              return p.read_text(encoding="utf-8", errors="replace")

          def write_text(pathlike, text):
              p = OUT / pathlike
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(text, encoding="utf-8")

          def load_json(pathlike, default=None):
              if default is None:
                  default = {}
              p = path(pathlike)
              if not p.exists():
                  return default
              try:
                  return json.loads(p.read_text(encoding="utf-8", errors="replace"))
              except Exception:
                  return default

          def sha256_file(pathlike):
              p = Path(pathlike)
              h = hashlib.sha256()
              with p.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def esc(value):
              return html.escape(str(value), quote=True)

          def norm(value, default="UNKNOWN"):
              if value is None:
                  return default
              if isinstance(value, bool):
                  return "YES" if value else "NO"
              value = str(value).strip()
              return value if value else default

          def slugify(value):
              value = re.sub(r"[^a-zA-Z0-9]+", "-", value.lower()).strip("-")
              return value or "section"

          def first_available(mapping, *keys, default="UNKNOWN"):
              if not isinstance(mapping, dict):
                  return default
              for key in keys:
                  if key in mapping and mapping[key] not in ("", None):
                      return mapping[key]
              return default

          def rel_github(pathlike):
              return f"{REPO_URL}/blob/main/{pathlike}"

          def copy_if_exists(src, dst=None):
              src_path = path(src)
              if not src_path.exists():
                  return None
              if dst is None:
                  dst = src
              dst_path = OUT / dst
              dst_path.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(src_path, dst_path)
              return dst_path

          def status_class(value, deployed=False):
              value = norm(value).upper()
              if deployed:
                  return "success" if value == "NO" else "danger"
              if value == "YES":
                  return "success"
              if value == "NO":
                  return "warning"
              return "neutral"

          def status_card(label, value, detail, deployed=False):
              cls = status_class(value, deployed=deployed)
              return f"""
                <article class="status-card {cls}">
                  <div class="status-kicker">{esc(label)}</div>
                  <div class="status-value">{esc(norm(value))}</div>
                  <p>{esc(detail)}</p>
                </article>
              """

          def markdown_inline(text):
              text = esc(text)
              text = re.sub(r"`([^`]+)`", r"<code>\1</code>", text)
              text = re.sub(r"\*\*([^*]+)\*\*", r"<strong>\1</strong>", text)
              text = re.sub(r"\*([^*]+)\*", r"<em>\1</em>", text)
              text = re.sub(r"\[([^\]]+)\]\(([^)]+)\)", r"<a href='\2'>\1</a>", text)
              return text

          def markdown_to_html(md):
              lines = md.splitlines()
              out = []
              i = 0
              in_code = False
              in_list = False

              def close_list():
                  nonlocal in_list
                  if in_list:
                      out.append("</ul>")
                      in_list = False

              while i < len(lines):
                  raw = lines[i].rstrip()
                  line = raw.strip()

                  if line.startswith("```"):
                      close_list()
                      if not in_code:
                          out.append("<pre><code>")
                          in_code = True
                      else:
                          out.append("</code></pre>")
                          in_code = False
                      i += 1
                      continue

                  if in_code:
                      out.append(esc(raw))
                      i += 1
                      continue

                  if not line:
                      close_list()
                      i += 1
                      continue

                  if raw.startswith("|") and i + 1 < len(lines) and lines[i + 1].strip().startswith("|"):
                      close_list()
                      table_lines = [raw]
                      i += 1
                      if i < len(lines):
                          sep = lines[i]
                          if re.match(r"^\s*\|?[\s:\-|]+\|?\s*$", sep):
                              i += 1
                      while i < len(lines) and lines[i].strip().startswith("|"):
                          table_lines.append(lines[i].rstrip())
                          i += 1

                      rows = []
                      for row in table_lines:
                          cells = [c.strip() for c in row.strip().strip("|").split("|")]
                          rows.append(cells)

                      if rows:
                          out.append("<div class='table-wrap'><table>")
                          out.append("<thead><tr>" + "".join(f"<th>{markdown_inline(c)}</th>" for c in rows[0]) + "</tr></thead>")
                          out.append("<tbody>")
                          for row in rows[1:]:
                              out.append("<tr>" + "".join(f"<td>{markdown_inline(c)}</td>" for c in row) + "</tr>")
                          out.append("</tbody></table></div>")
                      continue

                  if line.startswith("#"):
                      close_list()
                      level = min(len(line) - len(line.lstrip("#")), 4)
                      text = line[level:].strip()
                      out.append(f"<h{level} id='{slugify(text)}'>{markdown_inline(text)}</h{level}>")
                      i += 1
                      continue

                  if line.startswith(("- ", "* ")):
                      if not in_list:
                          out.append("<ul>")
                          in_list = True
                      out.append(f"<li>{markdown_inline(line[2:].strip())}</li>")
                      i += 1
                      continue

                  close_list()
                  out.append(f"<p>{markdown_inline(raw)}</p>")
                  i += 1

              close_list()
              if in_code:
                  out.append("</code></pre>")
              return "\n".join(out)

          cert = load_json("qa/mainnet-authorization-certificate.json")
          technical_decision = load_json("docs/MAINNET_TECHNICAL_READINESS_DECISION.json")
          deployment_decision = load_json("docs/MAINNET_DEPLOYMENT_AUTHORIZATION_DECISION.json")
          ethereum_decision = load_json("docs/ETHEREUM_MAINNET_AUTHORIZATION_DECISION.json")
          paper_manifest = load_json("docs/papers/sovereign-rsi/v6.3/PAPER_ASSET_MANIFEST.json")
          package_json = load_json("package.json")
          current_status = read_text("docs/CURRENT_STATUS.md")
          root_readme = read_text("README.md")
          paper_readme = read_text("docs/papers/sovereign-rsi/v6.3/README.md")
          toolchain_report = read_text("audit/TOOLCHAIN_CLEARANCE_REPORT.md")
          branch_evidence = load_json("qa/public-branch-protection-evidence.json")
          agialpha_verification = load_json("qa/public-agialpha-token-verification.json")

          technical_ready = first_available(cert, "technicallyMainnetReady", "technicalMainnetReady", default=first_available(technical_decision, "technicallyMainnetReady", "technicalMainnetReady"))
          deployment_authorized = first_available(cert, "mainnetDeploymentAuthorized", default=first_available(deployment_decision, "mainnetDeploymentAuthorized"))
          ethereum_authorized = first_available(cert, "ethereumMainnetAuthorized", default=first_available(ethereum_decision, "ethereumMainnetAuthorized"))
          mainnet_deployed = first_available(cert, "mainnetDeployed", "ethereumMainnetDeployed", default="NO")
          package_version = first_available(package_json, "version", default="UNKNOWN")
          certificate_hash = first_available(cert, "certificateHash", "sha256", default="not-recorded")
          source_commit = first_available(cert, "sourceCommit", "commit", default="not-recorded")
          chain_id = first_available(cert, "chainId", default="1")
          chain_name = first_available(cert, "chain", default="ethereum")
          private_package_required = first_available(cert, "privateOperatorAuthorizationPackageRequired", default="false")
          ci_can_deploy = first_available(cert, "ciCanDeployMainnet", default="false")
          runtime_secrets_stored = first_available(cert, "runtimeSecretsStoredInGitHub", default="false")

          important_evidence_files = [
              ("qa/mainnet-authorization-certificate.json", "Mainnet Authorization Certificate"),
              ("docs/MAINNET_AUTHORIZATION_CERTIFICATE.md", "Certificate Explanation"),
              ("docs/MAINNET_TECHNICAL_READINESS_DECISION.json", "Technical Readiness Decision"),
              ("docs/MAINNET_DEPLOYMENT_AUTHORIZATION_DECISION.json", "Deployment Authorization Decision"),
              ("docs/ETHEREUM_MAINNET_AUTHORIZATION_DECISION.json", "Ethereum Authorization Decision"),
              ("audit/TOOLCHAIN_CLEARANCE_REPORT.md", "Security Toolchain Clearance"),
              ("qa/public-agialpha-token-verification.json", "AGIALPHA Token Verification"),
              ("qa/public-branch-protection-evidence.json", "Branch Protection / Risk Acceptance"),
              ("qa/MANIFEST.json", "QA Manifest"),
          ]

          copied_evidence = []
          for src, label in important_evidence_files:
              dst = f"evidence/{Path(src).name}"
              copied = copy_if_exists(src, dst)
              if copied:
                  copied_evidence.append((label, src, dst, sha256_file(copied)))

          paper_assets = []
          paper_dir = path("docs/papers/sovereign-rsi/v6.3")
          if paper_dir.exists():
              for f in sorted(paper_dir.iterdir()):
                  if not f.is_file():
                      continue
                  allowed_exact = {"README.md", "PAPER_PUBLICATION_CHECKLIST.md", "PAPER_ASSET_MANIFEST.json", "CHECKSUMS.sha256"}
                  if "v6.3" in f.name or f.name in allowed_exact:
                      dst = PAPER_OUT / f.name
                      shutil.copy2(f, dst)
                      paper_assets.append({
                          "name": f.name,
                          "href": f"papers/sovereign-rsi/v6.3/{f.name}",
                          "sha256": sha256_file(dst),
                          "ext": f.suffix.lower()
                      })

          def asset_button(asset):
              name = asset["name"]
              href = asset["href"]
              ext = asset["ext"]
              if ext == ".pdf":
                  label = "Read PDF"
                  cls = "primary"
              elif ext == ".md":
                  label = "Read Markdown"
                  cls = "ghost"
              elif ext == ".docx":
                  label = "Download DOCX"
                  cls = "ghost"
              elif ext == ".tex":
                  label = "View TeX"
                  cls = "ghost"
              else:
                  label = name
                  cls = "ghost"
              return f"<a class='button {cls}' href='{esc(href)}'>{esc(label)}</a>"

          paper_buttons = "".join(asset_button(a) for a in paper_assets if a["ext"] in [".pdf", ".md", ".docx", ".tex"])
          if not paper_buttons:
              paper_buttons = "<span class='muted'>Canonical v6.3 paper assets were not found in this checkout.</span>"

          brand_svg = f"""<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="GoalOS AGIALPHA Ascension">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#040817"/>
                <stop offset="0.48" stop-color="#0c1737"/>
                <stop offset="1" stop-color="#1b123e"/>
              </linearGradient>
              <radialGradient id="glow" cx="76%" cy="28%" r="58%">
                <stop offset="0" stop-color="#6ee9ff" stop-opacity=".42"/>
                <stop offset=".42" stop-color="#8c6dff" stop-opacity=".20"/>
                <stop offset="1" stop-color="#000000" stop-opacity="0"/>
              </radialGradient>
              <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
                <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#ffffff" stroke-opacity=".075" stroke-width="1"/>
              </pattern>
            </defs>
            <rect width="1600" height="900" fill="url(#bg)"/>
            <rect width="1600" height="900" fill="url(#glow)"/>
            <rect width="1600" height="900" fill="url(#grid)"/>
            <rect x="82" y="82" width="1436" height="736" rx="44" fill="none" stroke="#ffd66b" stroke-width="4" opacity=".9"/>
            <text x="138" y="200" fill="#ffd66b" font-family="Arial, sans-serif" font-weight="900" font-size="58">GOALOS-NATIVE</text>
            <text x="138" y="292" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="78">α-AGI ASCENSION</text>
            <text x="138" y="366" fill="#65e8ff" font-family="Arial, sans-serif" font-weight="900" font-size="56">USING AGIALPHA</text>
            <line x1="138" y1="398" x2="760" y2="398" stroke="#ffd66b" stroke-width="5"/>
            <text x="138" y="475" fill="#e9f0ff" font-family="Arial, sans-serif" font-weight="800" font-size="40">Sovereign RSI Architecture</text>
            <text x="138" y="526" fill="#e9f0ff" font-family="Arial, sans-serif" font-weight="800" font-size="40">for Evidence-Governed Intelligence Organizations</text>
            <circle cx="1125" cy="292" r="150" fill="none" stroke="#ffd66b" stroke-width="4"/>
            <circle cx="1125" cy="292" r="102" fill="none" stroke="#65e8ff" stroke-width="4"/>
            <circle cx="1125" cy="292" r="58" fill="none" stroke="#b79cff" stroke-width="4"/>
            <text x="1092" y="319" fill="#ffd66b" font-family="Arial, sans-serif" font-weight="900" font-size="74">α</text>
            <text x="138" y="708" fill="#55f0b2" font-family="Arial, sans-serif" font-weight="800" font-size="34">Aim → Act → Prove → Evolve</text>
            <text x="138" y="758" fill="#65e8ff" font-family="Arial, sans-serif" font-weight="700" font-size="27">Request → Escrow → Execute → Proof → Validate → Settle → Chronicle</text>
          </svg>"""
          (ASSETS / "og.svg").write_text(brand_svg, encoding="utf-8")

          css = r"""
          :root {
            --ink: #eef6ff;
            --muted: #a7b7d6;
            --dim: #667799;
            --navy-950: #030614;
            --navy-900: #060b1b;
            --navy-850: #081026;
            --navy-800: #0a1734;
            --navy-700: #101f46;
            --gold: #ffd66b;
            --gold-2: #f3b94e;
            --cyan: #63e8ff;
            --mint: #55f0b2;
            --violet: #b79cff;
            --rose: #ff7897;
            --line: rgba(255,255,255,.13);
            --line-gold: rgba(255,214,107,.42);
            --glass: rgba(8, 18, 42, .74);
            --glass-2: rgba(13, 27, 62, .62);
            --shadow: 0 40px 120px rgba(0,0,0,.46);
            --radius-xl: 34px;
            --radius-lg: 24px;
            --radius-md: 16px;
          }

          * { box-sizing: border-box; }

          html {
            scroll-behavior: smooth;
            background: var(--navy-950);
          }

          body {
            margin: 0;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.55;
            min-height: 100vh;
            overflow-x: hidden;
            background:
              radial-gradient(circle at 80% 6%, rgba(99,232,255,.22), transparent 30rem),
              radial-gradient(circle at 8% 5%, rgba(255,214,107,.18), transparent 28rem),
              radial-gradient(circle at 50% 90%, rgba(183,156,255,.16), transparent 38rem),
              linear-gradient(135deg, #030614 0%, #081026 42%, #15133a 100%);
          }

          body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;
            background-image:
              linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255,255,255,.055) 1px, transparent 1px),
              linear-gradient(135deg, rgba(255,214,107,.07) 1px, transparent 1px);
            background-size: 48px 48px, 48px 48px, 90px 90px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.40), transparent);
          }

          body::after {
            content: "";
            position: fixed;
            inset: -20%;
            pointer-events: none;
            z-index: -1;
            background:
              radial-gradient(circle at 25% 20%, rgba(255,214,107,.08), transparent 22rem),
              radial-gradient(circle at 73% 32%, rgba(99,232,255,.12), transparent 30rem),
              radial-gradient(circle at 50% 70%, rgba(183,156,255,.10), transparent 30rem);
            filter: blur(8px);
          }

          a { color: var(--cyan); text-decoration: none; }
          a:hover { color: #bdf6ff; text-decoration: underline; }

          code {
            color: #d9f9ff;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 7px;
            padding: .08rem .34rem;
          }

          pre {
            background: rgba(1,5,15,.68);
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 18px;
            padding: 18px;
            overflow-x: auto;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
          }

          pre code {
            background: transparent;
