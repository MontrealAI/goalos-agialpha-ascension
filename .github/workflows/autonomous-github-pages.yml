name: Premium Autonomous GitHub Pages Website

on:
  push:
    branches: [ main ]
    paths:
      - "scripts/build_goalos_agialpha_final_main_website_v49.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v49.py"
      - ".github/workflows/autonomous-github-pages.yml"
      - ".github/workflows/final-main-website-v49-mission-os-paper-smoke-test.yml"
  workflow_dispatch:

concurrency:
  group: premium-autonomous-github-pages
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build Mission OS Paper website v49
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build final main website
        run: python3 scripts/build_goalos_agialpha_final_main_website_v49.py --out site
      - name: Verify final main website
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v49.py --site site
      - name: Confirm generated public site contains no zip files
        shell: bash
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains zip files." >&2
            find site -name "*.zip" -print >&2
            exit 1
          fi
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    name: Deploy Mission OS Paper website to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
