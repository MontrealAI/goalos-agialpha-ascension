name: Premium Autonomous GitHub Pages Website

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "qa/**"
      - "audit/**"
      - "deployments/**"
      - "package.json"
      - ".github/workflows/autonomous-github-pages.yml"
      - "site-assets/proof-pages/**"
      - "data/proof-cards/**"
      - "data/examples/**"
      - "docs/examples/**"
      - "evidence/examples/**"
      - "scripts/integrate_goalos_agialpha_proof_card_017_v31.py"
      - "scripts/verify_goalos_agialpha_proof_card_017_v31.py"
  workflow_dispatch:

concurrency:
  group: premium-autonomous-github-pages
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build premium autonomous website
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build existing premium website if builder exists
        shell: bash
        run: |
          if [ -f scripts/build_premium_website.py ]; then
            python3 scripts/build_premium_website.py --out site
          elif [ -f scripts/build_goalos_agialpha_website.py ]; then
            python3 scripts/build_goalos_agialpha_website.py --out site
          elif [ -f scripts/build_website.py ]; then
            python3 scripts/build_website.py --out site
          else
            mkdir -p site
            if [ -f README.md ]; then
              printf '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GoalOS AGIALPHA Ascension</title></head><body><main><h1>GoalOS AGIALPHA Ascension</h1><p>Repository-generated website shell.</p></main></body></html>' > site/index.html
            else
              printf '<!doctype html><html><body><main><h1>GoalOS AGIALPHA Ascension</h1></main></body></html>' > site/index.html
            fi
          fi
      - name: Integrate Proof Card 016 into main website root
        shell: bash
        run: python3 scripts/integrate_goalos_agialpha_proof_card_017_v31.py --site site
      - name: Verify Proof Cards 001-017 before deployment
        shell: bash
        run: python3 scripts/verify_goalos_agialpha_proof_card_017_v31.py --site site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    name: Deploy premium website to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
