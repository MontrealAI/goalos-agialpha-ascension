name: Autonomous Ascension Website v82

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/build_goalos_agialpha_ascension_website_v82.py'
      - 'scripts/verify_goalos_agialpha_ascension_website_v82.py'
      - 'scripts/visual_layout_check_v82.js'
      - 'website/content/**'
      - 'assets/**'
      - 'docs/**'
      - '.github/workflows/autonomous-ascension-website-v82.yml'

concurrency:
  group: goalos-ascension-website-v82
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build and verify v82 website
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Install optional PDF renderer
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Build website
        run: python3 scripts/build_goalos_agialpha_ascension_website_v82.py --out site
      - name: Verify website
        run: python3 scripts/verify_goalos_agialpha_ascension_website_v82.py --site site
      - name: Layout QA
        run: node scripts/visual_layout_check_v82.js site
      - name: Reject ZIPs in public site
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "ZIP file found in public site"; exit 1; fi
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
