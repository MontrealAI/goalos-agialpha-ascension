name: Ascension Website v72 Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_ascension_website_v72.py"
      - "scripts/verify_goalos_agialpha_ascension_website_v72.py"
      - ".github/workflows/ascension-website-v72-smoke-test.yml"
      - "docs/papers/mission-os/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build site
        run: python3 scripts/build_goalos_agialpha_ascension_website_v72.py --out site
      - name: Verify site
        run: python3 scripts/verify_goalos_agialpha_ascension_website_v72.py --site site
      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files."; exit 1
          fi
