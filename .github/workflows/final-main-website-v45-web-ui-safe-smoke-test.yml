name: Final Main Website v45 Web UI Safe Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_final_main_website_v45.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v45.py"
      - ".github/workflows/final-main-website-v45-web-ui-safe-smoke-test.yml"
      - ".github/workflows/final-main-website-v44-web-ui-smoke-test.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build site
        run: python3 scripts/build_goalos_agialpha_final_main_website_v45.py --out site
      - name: Verify site
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v45.py --site site
      - name: Confirm generated public site contains no zip files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Zip file found in generated public site."
            exit 1
          fi
          echo "No zip files found in generated public site."
      - name: Report legacy repository zip files without failing
        run: |
          count="$(git ls-files '*.zip' | wc -l | tr -d ' ')"
          echo "Tracked repository zip files currently present: $count"
          if [ "$count" != "0" ]; then
            echo "::warning::This repository already contains tracked zip files from earlier commits. The v45 upload folder itself contains no zip files."
            git ls-files '*.zip' | head -50
          fi
