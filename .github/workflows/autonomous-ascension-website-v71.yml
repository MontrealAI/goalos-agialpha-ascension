name: Autonomous Ascension Website v71

on:
  push:
    branches: [ main ]
    paths:
      - "scripts/build_goalos_agialpha_ascension_website_v71.py"
      - "scripts/verify_goalos_agialpha_ascension_website_v71.py"
      - "docs/**"
      - "data/**"
      - "website/**"
      - "assets/**"
      - ".github/workflows/autonomous-ascension-website-v71.yml"
  workflow_dispatch:

concurrency:
  group: goalos-ascension-website-v71
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build Ascension website v71
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build website
        run: python3 scripts/build_goalos_agialpha_ascension_website_v71.py --out site
      - name: Verify website
        run: python3 scripts/verify_goalos_agialpha_ascension_website_v71.py --site site
      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files."; exit 1
          fi
      - name: Upload QA reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ascension-website-v71-qa
          path: |
            site/qa/QA_ASCENSION_WEBSITE_v71.json
            site/qa/QA_ASCENSION_WEBSITE_v71.md
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    name: Deploy Ascension website v71 to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
