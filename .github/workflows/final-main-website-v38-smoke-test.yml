name: Final Main Website v38 Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "site-assets/main-website-v38/**"
      - "scripts/build_goalos_agialpha_final_main_website_v38.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v38.py"
      - ".github/workflows/final-main-website-v38-smoke-test.yml"

permissions:
  contents: read

jobs:
  smoke-test:
    name: Build and verify final website v38
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build website
        run: python3 scripts/build_goalos_agialpha_final_main_website_v38.py --out site

      - name: Verify website
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v38.py --site site

      - name: Upload local smoke-test artifact
        uses: actions/upload-artifact@v7
        with:
          name: goalos-agialpha-final-main-website-v38
          path: site
