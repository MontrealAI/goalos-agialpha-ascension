name: GoalOS Mission OS Paper Pages
on:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: |
          mkdir -p site
          cp -R *.html site/ 2>/dev/null || true
          mkdir -p site/docs/papers/mission-os
          cp docs/papers/mission-os/GoalOS_Mission_OS_Paper.pdf site/docs/papers/mission-os/
          cp docs/papers/mission-os/GoalOS_Mission_OS_One_Page_Field_Card.pdf site/docs/papers/mission-os/
          test -s site/mission-os.html
          test -s site/docs/papers/mission-os/GoalOS_Mission_OS_Paper.pdf
          test -s site/docs/papers/mission-os/GoalOS_Mission_OS_One_Page_Field_Card.pdf
      - uses: actions/upload-pages-artifact@v3
        with: {path: site}
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
