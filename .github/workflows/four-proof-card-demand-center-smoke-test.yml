name: Four Proof Card Demand Center Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_four_proof_card_site_v9.py"
      - "scripts/verify_goalos_agialpha_four_proof_card_site_v9.py"
      - "docs/examples/**"
      - "data/examples/**"
      - "evidence/examples/**"
      - ".github/workflows/four-proof-card-demand-center-smoke-test.yml"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Build four proof card demand center
        run: python3 scripts/build_goalos_agialpha_four_proof_card_site_v9.py --out site-smoke
      - name: Verify generated site
        run: python3 scripts/verify_goalos_agialpha_four_proof_card_site_v9.py --site site-smoke
