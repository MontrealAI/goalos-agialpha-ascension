name: GoalOS AGIALPHA Audit-Candidate CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-candidate-public-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run repo:all
      - name: Production continuation readiness check
        run: python scripts/repository_production_readiness_check.py
      - run: npm run assert:public-status
      - run: npm run compile
      - run: npm test
      - run: npm run test:all
      - run: npm run static-check
      - run: npm run readiness:v4.3
      - run: npm run evidence:docket:template
      - run: npm run local:authorization-rehearsal
      - name: Public-only mainnet authorization check (private evidence pending is not a CI failure)
        run: npm run mainnet:authorization-check:public # npm run mainnet:authorization-check
