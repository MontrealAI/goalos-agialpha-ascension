name: GoalOS AGIALPHA Ascension v86 Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'website/v86_actual_site/**'
      - 'scripts/build_goalos_agialpha_ascension_website_v86.py'
      - 'scripts/verify_goalos_agialpha_ascension_website_v86.py'
      - 'scripts/visual_layout_check_v86.py'
      - 'content/proof-gradient-sovereign.json'
      - 'content/proof-mission-002-ascension-protocol.json'
      - 'content/proof-mission-003-capability-constellation.json'
      - 'content/proof-mission-004-sovereign-institution.json'
      - 'content/proof-mission-005-interinstitutional-accord.json'
      - 'content/proof-mission-006-long-horizon.json'
      - 'content/proof-mission-007-civilizational-covenant.json'
      - 'content/proof-mission-008-open-future.json'
      - 'data/mainnet/v4.4.0-mainnet-2026-06-21.json'
      - 'scripts/website/build_proof_gradient_sovereign.py'
      - 'scripts/website/verify_proof_gradient_sovereign.py'
      - 'scripts/website/visual_check_proof_gradient_sovereign.py'
      - 'scripts/website/build_proof_mission_002.py'
      - 'scripts/website/verify_proof_mission_002.py'
      - 'scripts/website/visual_check_proof_mission_002.py'
      - 'scripts/website/build_proof_mission_003.py'
      - 'scripts/website/verify_proof_mission_003.py'
      - 'scripts/website/visual_check_proof_mission_003.py'
      - 'scripts/website/build_proof_mission_004.py'
      - 'scripts/website/verify_proof_mission_004.py'
      - 'scripts/website/visual_check_proof_mission_004.py'
      - 'scripts/website/build_proof_mission_005.py'
      - 'scripts/website/verify_proof_mission_005.py'
      - 'scripts/website/visual_check_proof_mission_005.py'
      - 'scripts/website/build_proof_mission_006.py'
      - 'scripts/website/verify_proof_mission_006.py'
      - 'scripts/website/visual_check_proof_mission_006.py'
      - 'scripts/website/build_proof_mission_007.py'
      - 'scripts/website/verify_proof_mission_007.py'
      - 'scripts/website/visual_check_proof_mission_007.py'
      - 'scripts/website/build_proof_mission_008.py'
      - 'scripts/website/verify_proof_mission_008.py'
      - 'scripts/website/visual_check_proof_mission_008.py'
      - 'test/test_proof_gradient_sovereign.py'
      - 'test/test_proof_mission_002.py'
      - 'test/test_proof_mission_003.py'
      - 'test/test_proof_mission_004.py'
      - 'test/test_proof_mission_005.py'
      - 'test/test_proof_mission_006.py'
      - 'test/test_proof_mission_007.py'
      - 'test/test_proof_mission_008.py'
      - 'docs/PROOF_GRADIENT_SOVEREIGN_WEBSITE.md'
      - 'docs/PROOF_MISSION_002_ASCENSION_PROTOCOL_WEBSITE.md'
      - 'docs/PROOF_MISSION_003_CAPABILITY_CONSTELLATION_WEBSITE.md'
      - 'docs/PROOF_MISSION_004_SOVEREIGN_INSTITUTION_WEBSITE.md'
      - 'docs/PROOF_MISSION_005_INTERINSTITUTIONAL_ACCORD_WEBSITE.md'
      - 'docs/PROOF_MISSION_006_LONG_HORIZON_WEBSITE.md'
      - 'docs/PROOF_MISSION_007_CIVILIZATIONAL_COVENANT_WEBSITE.md'
      - 'docs/PROOF_MISSION_008_OPEN_FUTURE_WEBSITE.md'
      - '.github/workflows/goalos-agialpha-ascension-v86-final.yml'
      - '.github/workflows/goalos-agialpha-ascension-v86-smoke-test.yml'

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: '1'

jobs:
  smoke-test:
    name: Build, preserve, verify, and layout-test Proof Missions 001–008
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build preserved actual website
        run: python3 scripts/build_goalos_agialpha_ascension_website_v86.py --out site

      - name: Add Public Proof Mission 001 additively
        run: python3 scripts/website/build_proof_gradient_sovereign.py --site site

      - name: Add Public Proof Mission 002 additively
        run: python3 scripts/website/build_proof_mission_002.py --site site

      - name: Add Public Proof Mission 003 and generate the three-mission hub
        run: python3 scripts/website/build_proof_mission_003.py --site site

      - name: Verify canonical content and Missions 001–003
        run: |
          python3 scripts/verify_goalos_agialpha_ascension_website_v86.py --site site
          python3 scripts/website/verify_proof_gradient_sovereign.py --site site
          python3 scripts/website/verify_proof_mission_002.py --site site
          python3 scripts/website/verify_proof_mission_003.py --site site

      - name: Run Missions 001–003 regression tests
        run: |
          python3 -m unittest discover -s test -p 'test_proof_gradient_sovereign.py' -v
          python3 -m unittest discover -s test -p 'test_proof_mission_002.py' -v
          python3 -m unittest discover -s test -p 'test_proof_mission_003.py' -v

      - name: Install Playwright Chromium
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Run canonical and Missions 001–003 browser QA
        run: |
          python3 scripts/visual_layout_check_v86.py --site site --screenshots
          python3 scripts/website/visual_check_proof_gradient_sovereign.py --site site --screenshots
          python3 scripts/website/visual_check_proof_mission_002.py --site site --screenshots
          python3 scripts/website/visual_check_proof_mission_003.py --site site --screenshots

      - name: Add and verify Public Proof Mission 004
        run: |
          python3 scripts/website/build_proof_mission_004.py --site site
          python3 scripts/website/verify_proof_mission_004.py --site site
          python3 -m unittest discover -s test -p 'test_proof_mission_004.py' -v
          python3 scripts/website/visual_check_proof_mission_004.py --site site --screenshots

      - name: Add and verify Public Proof Mission 005
        run: |
          python3 scripts/website/build_proof_mission_005.py --site site
          python3 scripts/website/verify_proof_mission_005.py --site site
          python3 -m unittest discover -s test -p 'test_proof_mission_005.py' -v
          python3 scripts/website/visual_check_proof_mission_005.py --site site --screenshots

      - name: Build Public Proof Mission 006 before any Mission 006 verification or browser QA
        run: python3 scripts/website/build_proof_mission_006.py --site site

      - name: Assert Mission 006 generated outputs exist
        shell: bash
        run: |
          set -euo pipefail
          for file in site/proof-mission-006.html site/proof-missions.html site/index.html site/qa/proof-mission-006-build.json; do
            test -s "$file" || { echo "Missing generated Mission 006 output: $file"; find site -maxdepth 2 -type f | sort; exit 1; }
          done

      - name: Verify and browser-test Public Proof Mission 006
        run: |
          python3 scripts/website/verify_proof_mission_006.py --site site --repo .
          python3 -m unittest discover -s test -p 'test_proof_mission_006.py' -v
          python3 scripts/website/visual_check_proof_mission_006.py --site site --output site/qa/proof-mission-006 --screenshots

      - name: Build Public Proof Mission 007 before any Mission 007 verification or browser QA
        run: python3 scripts/website/build_proof_mission_007.py --site site

      - name: Assert Mission 007 generated outputs exist
        shell: bash
        run: |
          set -euo pipefail
          for file in site/proof-mission-007.html site/proof-mission-006.html site/proof-missions.html site/index.html site/qa/proof-mission-007-build.json; do
            test -s "$file" || { echo "Missing generated Mission 007 output: $file"; find site -maxdepth 2 -type f | sort; exit 1; }
          done

      - name: Verify and browser-test Public Proof Mission 007
        run: |
          python3 scripts/website/verify_proof_mission_007.py --site site --repo .
          python3 -m unittest discover -s test -p 'test_proof_mission_007.py' -v
          python3 scripts/website/visual_check_proof_mission_007.py --site site --output site/qa/proof-mission-007 --screenshots

      - name: Build Public Proof Mission 008 before any Mission 008 verification or browser QA
        run: python3 scripts/website/build_proof_mission_008.py --site site

      - name: Assert Mission 008 generated outputs exist
        shell: bash
        run: |
          set -euo pipefail
          for file in site/proof-mission-008.html site/proof-mission-007.html site/proof-missions.html site/index.html site/qa/proof-mission-008-build.json; do
            test -s "$file" || { echo "Missing generated Mission 008 output: $file"; find site -maxdepth 2 -type f | sort; exit 1; }
          done

      - name: Verify and browser-test Public Proof Mission 008
        run: |
          python3 scripts/website/verify_proof_mission_008.py --site site --repo .
          python3 -m unittest discover -s test -p 'test_proof_mission_008.py' -v
          python3 scripts/website/visual_check_proof_mission_008.py --site site --output site/qa/proof-mission-008 --screenshots

      - name: Reject archives and private operator material in public site
        shell: bash
        run: |
          set -euo pipefail
          if find site \( -name '*.zip' -o -name '*.7z' -o -name '*.tar' -o -name '*.gz' -o -name '*.rar' \) -print | grep -q .; then
            echo 'Archive file found inside public site. Refusing to publish.'
            exit 1
          fi
          if grep -RIlE 'PRIVATE_MAINNET_DEPLOYER_PRIVATE_KEY|SEED_PHRASE|MNEMONIC|MAINNET_RPC_URL=|ETHERSCAN_API_KEY=' site; then
            echo 'Private operator material found inside public site. Refusing to publish.'
            exit 1
          fi

      - name: Upload QA and preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goalos-public-proof-missions-smoke-preview
          path: |
            site/index.html
            site/proof-missions.html
            site/proof-gradient-challenge.html
            site/proof-mission-002.html
            site/proof-mission-003.html
            site/proof-mission-004.html
            site/proof-mission-005.html
            site/proof-mission-006.html
            site/proof-mission-007.html
            site/proof-mission-008.html
            site/downloads/proof-gradient/
            site/downloads/proof-missions/
            site/qa/
          if-no-files-found: error
          retention-days: 30
