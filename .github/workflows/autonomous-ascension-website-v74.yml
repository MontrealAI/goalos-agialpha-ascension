name: Autonomous Ascension Website v74

on:
  push:
    branches: [ main ]
    paths:
      - "docs/papers/mission-os/**"
      - "scripts/build_goalos_agialpha_ascension_website_v74.py"
      - "scripts/verify_goalos_agialpha_ascension_website_v74.py"
      - ".github/workflows/autonomous-ascension-website-v74.yml"
  workflow_dispatch:

concurrency:
  group: autonomous-ascension-website-v74
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - name: Build website
        run: python3 scripts/build_goalos_agialpha_ascension_website_v74.py --out site
      - name: Verify website
        run: python3 scripts/verify_goalos_agialpha_ascension_website_v74.py --site site
      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files."; exit 1
          fi
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
