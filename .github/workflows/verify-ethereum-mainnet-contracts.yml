name: Verify Ethereum Mainnet contracts
on:
  workflow_dispatch:
permissions:
  contents: read
concurrency: verify-ethereum-mainnet-contracts
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This workflow verifies source code for already-deployed Mainnet contracts. It cannot deploy or broadcast Ethereum Mainnet transactions."
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm run compile:ci
      - name: Verify from manifest only
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          test -n "$ETHERSCAN_API_KEY"
          test -z "$ALLOW_MAINNET_DEPLOYMENT"
          npm run verify:mainnet:all
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mainnet-verification-evidence
          path: |
            qa/mainnet-contract-verification-evidence.json
            docs/ETHEREUM_MAINNET_CONTRACT_VERIFICATION_REPORT.md
            qa/manual-verification-commands.mainnet.md
