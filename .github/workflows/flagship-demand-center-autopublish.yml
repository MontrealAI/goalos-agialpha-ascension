name: Flagship Demand Center Autopublish

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/build_goalos_agialpha_triple_proof_card_site_v8.py"
      - "scripts/verify_goalos_agialpha_triple_proof_card_site_v8.py"
      - "docs/examples/proof-card-*.md"
      - "data/examples/proof-card-*.json"
      - "evidence/examples/proof-card-*-evidence-docket-template.json"
      - ".github/workflows/triple-proof-card-demand-center-autopublish.yml"
      - ".github/workflows/flagship-demand-center-autopublish.yml"

concurrency:
  group: triple-proof-card-demand-center-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify all three proof cards
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build Triple Proof Card Demand Center
        run: python3 scripts/build_goalos_agialpha_triple_proof_card_site_v8.py --out site
      - name: Verify complete website before deployment
        run: python3 scripts/verify_goalos_agialpha_triple_proof_card_site_v8.py --site site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    name: Deploy Triple Proof Card Demand Center to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
