name: Ethereum Sepolia Rehearsal
on:
  workflow_dispatch:
    inputs:
      run_real_sepolia:
        type: boolean
        required: true
        default: false
jobs:
  rehearsal:
    runs-on: ubuntu-latest
    if: ${{ inputs.run_real_sepolia == true }}
    environment: sepolia-rehearsal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
      - run: npm run compile
      - name: Run Sepolia rehearsal
        env:
          ETHEREUM_SEPOLIA_RPC_URL: ${{ secrets.ETHEREUM_SEPOLIA_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.SEPOLIA_PRIVATE_KEY }}
          FOUNDER_ADDRESS: ${{ vars.FOUNDER_ADDRESS }}
          TREASURY_ADDRESS: ${{ vars.TREASURY_ADDRESS }}
          COMMERCIALIZATION_PERFORMANCE_ADMIN: ${{ vars.COMMERCIALIZATION_PERFORMANCE_ADMIN }}
          PROOF_REWARDS_ADMIN: ${{ vars.PROOF_REWARDS_ADMIN }}
          LIQUIDITY_ADMIN: ${{ vars.LIQUIDITY_ADMIN }}
          SECURITY_ADMIN: ${{ vars.SECURITY_ADMIN }}
          COMMUNITY_ADMIN: ${{ vars.COMMUNITY_ADMIN }}
        run: npm run sepolia:rehearsal && npm run sepolia:evidence
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sepolia-rehearsal-evidence
          path: |
            deployments/ethereum-sepolia.agialpha.latest.json
            evidence/sepolia/**
            docs/ETHEREUM_SEPOLIA_REHEARSAL_REPORT.md
