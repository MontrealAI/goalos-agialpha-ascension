name: Ethereum Sepolia Rehearsal

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-rehearsal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run compile:ci
      - name: Deterministic local authorization rehearsal (no secrets)
        run: npm run local:authorization-rehearsal
      - name: Public-only authorization check (private evidence may be pending)
        run: python scripts/mainnet-authorization-check.py --public-only-final
