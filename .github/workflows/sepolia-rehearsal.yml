name: Local/Sepolia Rehearsal

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-rehearsal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run compile:ci
      - name: Deterministic local authorization rehearsal (no secrets)
        run: npm run local:authorization-rehearsal
      - run: npm run mainnet:release-state:check
      - run: npm run mainnet:postdeploy:operator-evidence:validate
      - name: Public certificate authorization check (Sepolia optional)
        run: npm run mainnet:authorization-check:public
