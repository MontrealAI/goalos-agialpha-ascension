name: Final Authorization Evidence Check
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  public-redacted-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Public-only status assertion
        run: python scripts/assert_public_status.py
      - name: No private operator data in public repo
        run: python scripts/no_private_operator_data_check.py
      - name: Public or redacted authorization check (no secrets required)
        shell: bash
        run: |
          if test -f qa/public-mainnet-technical-readiness-evidence.json \
             && test -f qa/public-mainnet-deployment-authorization-evidence.json \
             && test -f qa/public-ethereum-mainnet-authorization-evidence.json; then
            python scripts/mainnet-authorization-check.py --public-only-final
          else
            python scripts/mainnet-authorization-check.py --public-only-final
          fi
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: public-mainnet-authorization-decision
          path: |
            docs/MAINNET_TECHNICAL_READINESS_DECISION.*
            docs/MAINNET_DEPLOYMENT_AUTHORIZATION_DECISION.*
            docs/ETHEREUM_MAINNET_AUTHORIZATION_DECISION.*
