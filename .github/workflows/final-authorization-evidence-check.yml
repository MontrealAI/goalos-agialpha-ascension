name: Final Authorization Evidence Check
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  public-redacted-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run mainnet:certificate
      - run: npm run mainnet:certificate:validate
      - run: npm run docs:status
      - name: Public-only status assertion
        run: npm run assert:public-status
      - name: No private operator data in public repo
        run: npm run repo:no-private-operator-data
      - name: Certificate-backed public authorization check (no secrets required)
        run: npm run mainnet:authorization-check:public
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: public-mainnet-authorization-decision
          path: |
            qa/mainnet-authorization-certificate.json
            docs/MAINNET_TECHNICAL_READINESS_DECISION.*
            docs/MAINNET_DEPLOYMENT_AUTHORIZATION_DECISION.*
            docs/ETHEREUM_MAINNET_AUTHORIZATION_DECISION.*
