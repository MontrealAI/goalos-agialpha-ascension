name: Final Main Website v39 Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "site-assets/main-website-v39/**"
      - "scripts/build_goalos_agialpha_final_main_website_v39.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v39.py"
      - ".github/workflows/final-main-website-v39-smoke-test.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build site
        run: python3 scripts/build_goalos_agialpha_final_main_website_v39.py --out site
      - name: Verify site
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v39.py --site site
