name: Complete Main Website v36 Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "site-assets/main-website-v36/**"
      - "scripts/build_goalos_agialpha_complete_main_website_v36.py"
      - "scripts/verify_goalos_agialpha_complete_main_website_v36.py"
      - ".github/workflows/complete-main-website-v36-smoke-test.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Build website locally
        run: python3 scripts/build_goalos_agialpha_complete_main_website_v36.py --out site
      - name: Verify website locally
        run: python3 scripts/verify_goalos_agialpha_complete_main_website_v36.py --site site
