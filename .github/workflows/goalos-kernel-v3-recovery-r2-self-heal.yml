name: GoalOS Kernel v3 R2 · Materialize Review Branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/goalos-kernel-v3-recovery-r2-self-heal.yml
  workflow_dispatch:

concurrency:
  group: goalos-kernel-v3-r2-materialize-review-branch
  cancel-in-progress: false

permissions:
  contents: write

env:
  EXPECTED_REPOSITORY: MontrealAI/goalos-agialpha-ascension
  AUDITED_BASELINE_COMMIT: 076a7a7a8d1713d4849e95e1c58b8b6ccec0df03
  BOOTSTRAP_WORKFLOW: .github/workflows/INSTALL_GOALOS_KERNEL_V3_INSTITUTIONAL_PUBLICATION_R2.yml
  BOOTSTRAP_SHA256: 9f1e8de6d4ede30bad77b321c7dc9def4963e9fd86056d97731257caabcbee35
  PAYLOAD_SHA256: 86847c15a8c8873f9b11b87014eb0ad0b36d3a0d044d69fbfa01da0c87f240f8
  RELEASE_PATH: release/kernel-v3-institutional-publication-v3.0.0-r2/RELEASE_MANIFEST.json
  RELEASE_SHA256: 9deefd544e2259eae8d065d134dcf87239b0da1864ab65f9c55b62fef1319fd5
  REVIEW_BRANCH: automation/kernel-v3-institutional-publication-r2-materials

jobs:
  materialize:
    name: Validate the audited payload and publish the non-workflow review materials
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Recover, validate, and stage the audited package
        shell: bash
        run: |
          set -euo pipefail
          fail() { echo "ERROR: $*" >&2; exit 1; }
          [[ "$GITHUB_REPOSITORY" == "$EXPECTED_REPOSITORY" ]] || fail "This workflow is bound to $EXPECTED_REPOSITORY."
          [[ "$GITHUB_REF" == 'refs/heads/main' ]] || fail 'Run this workflow from main.'
          git cat-file -e "$AUDITED_BASELINE_COMMIT^{commit}" || fail 'The audited baseline commit is unavailable.'
          git merge-base --is-ancestor "$AUDITED_BASELINE_COMMIT" HEAD || fail 'Current main no longer descends from the audited baseline.'
          test -s "$BOOTSTRAP_WORKFLOW" || fail "Missing audited bootstrap: $BOOTSTRAP_WORKFLOW"

          python3 - <<'PY_BOOTSTRAP'
          import hashlib, os, subprocess
          path=os.environ['BOOTSTRAP_WORKFLOW']
          committed=subprocess.check_output(['git','show',f'HEAD:{path}'])
          digest=hashlib.sha256(committed).hexdigest()
          expected=os.environ['BOOTSTRAP_SHA256']
          if digest != expected:
              raise SystemExit(f'Committed bootstrap digest mismatch: expected {expected}, found {digest}')
          print(f'Committed bootstrap digest PASS: {digest}')
          PY_BOOTSTRAP

          stage="$RUNNER_TEMP/goalos-publication-r2-stage"
          archive="$RUNNER_TEMP/goalos-publication-r2-payload.tar.gz"
          rm -rf "$stage"
          mkdir -p "$stage"
          python3 - "$BOOTSTRAP_WORKFLOW" "$archive" <<'PY_PAYLOAD'
          import base64, hashlib, pathlib, re, subprocess, sys, tarfile
          source=subprocess.check_output(['git','show',f'HEAD:{sys.argv[1]}']).decode('utf-8')
          match=re.search(r"<<'GOALOS_R2_PAYLOAD'\n(?P<data>.*?)\n\s*GOALOS_R2_PAYLOAD", source, re.S)
          if not match:
              raise SystemExit('Cannot locate GOALOS_R2_PAYLOAD in the audited bootstrap')
          encoded=''.join(line.strip() for line in match.group('data').splitlines())
          payload=base64.b64decode(encoded, validate=True)
          destination=pathlib.Path(sys.argv[2])
          destination.write_bytes(payload)
          print(f'Recovered payload: {len(payload)} bytes; SHA-256={hashlib.sha256(payload).hexdigest()}')
          with tarfile.open(destination, 'r:gz') as bundle:
              members=bundle.getmembers()
              if not members:
                  raise SystemExit('Recovered payload is empty')
              for member in members:
                  path=pathlib.PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts or not member.isfile():
                      raise SystemExit(f'Unsafe payload member: {member.name}')
          print(f'Payload path-safety PASS ({len(members)} files)')
          PY_PAYLOAD
          echo "$PAYLOAD_SHA256  $archive" | sha256sum --check --strict
          tar -xzf "$archive" -C "$stage"
          test -s "$stage/$RELEASE_PATH"
          echo "$RELEASE_SHA256  $stage/$RELEASE_PATH" | sha256sum --check --strict

          while IFS= read -r -d '' staged; do
            relative="${staged#"$stage/"}"
            if [[ -e "$relative" ]] && ! cmp -s "$staged" "$relative"; then
              fail "Refusing to overwrite a non-identical existing file: $relative"
            fi
          done < <(find "$stage" -type f -print0)
          cp -a "$stage/." .

          python3 scripts/website/verify_sme_kernel_v3_publication.py --root . --source-only
          python3 -m unittest discover -s test -p 'test_sme_kernel_v3_publication_website.py' -v
          node --check website/features/sme-kernel-v3-publication/assets/sme-kernel-v3-publication.js
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/goalos-sme-kernel-v3-institutional-publication-smoke-test.yml'); puts 'YAML PASS'"

          if git ls-remote --exit-code --heads origin "$REVIEW_BRANCH" >/dev/null 2>&1; then
            fail "Review branch already exists: $REVIEW_BRANCH"
          fi
          git switch -c "$REVIEW_BRANCH"
          while IFS= read -r -d '' staged; do
            relative="${staged#"$stage/"}"
            [[ "$relative" == .github/workflows/* ]] && continue
            git add -- "$relative"
          done < <(find "$stage" -type f -print0)

          if git diff --cached --name-only | grep -q '^\.github/workflows/'; then
            fail 'A workflow file was unexpectedly staged; refusing to push.'
          fi
          find "$stage" -type f ! -path "$stage/.github/workflows/*" -printf '%P\n' | sort > "$RUNNER_TEMP/expected.txt"
          git diff --cached --name-only | sort > "$RUNNER_TEMP/observed.txt"
          diff -u "$RUNNER_TEMP/expected.txt" "$RUNNER_TEMP/observed.txt"
          git diff --cached --check -- . ':(exclude)docs/SME_KERNEL_V3_INSTITUTIONAL_PUBLICATION.md'

          git config user.name 'GoalOS Publication Integrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Stage GoalOS Kernel v3 institutional publication R2 materials'
          git push --set-upstream origin "$REVIEW_BRANCH"

      - name: Publish the handoff
        shell: bash
        run: |
          {
            echo '# GoalOS Kernel v3 R2 materials are ready'
            echo
            echo "- Review branch: \`$REVIEW_BRANCH\`"
            echo '- The commit contains every audited publication source file except workflow files.'
            echo '- Workflow updates and temporary-workflow cleanup are completed separately through the authenticated GitHub integration.'
            echo '- The live website has not changed.'
          } >> "$GITHUB_STEP_SUMMARY"
