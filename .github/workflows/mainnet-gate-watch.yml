name: Mainnet Gate Watch

on:
  pull_request:
    paths:
      - "scripts/**"
      - "contracts/**"
      - "schemas/**"
      - "docs/**"
      - ".env.example"
      - "package.json"
      - "qa/public-*.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mainnet-gate-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Assert public status remains bounded
        run: python scripts/assert_public_status.py
      - name: Public-only mainnet authorization check without npm install or secrets
        run: python scripts/mainnet-authorization-check.py --public-only
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: mainnet-gate-watch-decision
          path: |
            docs/MAINNET_AUTHORIZATION_DECISION.*
            docs/ETHEREUM_MAINNET_AUTHORIZATION_DECISION.*
