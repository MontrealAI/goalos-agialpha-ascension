name: Mainnet Gate Watch

on:
  pull_request:
    paths:
      - "scripts/**"
      - "contracts/**"
      - "schemas/**"
      - "docs/**"
      - ".github/**"
      - ".env.example"
      - "package.json"
      - "qa/public-*.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mainnet-gate-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run repo:all
      - run: npm run assert:public-status
      - name: Public-only mainnet authorization check without secrets
        run: npm run mainnet:authorization-check:public
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: mainnet-gate-watch-decision
          path: |
            docs/MAINNET_AUTHORIZATION_DECISION.*
            docs/ETHEREUM_MAINNET_AUTHORIZATION_DECISION.*
