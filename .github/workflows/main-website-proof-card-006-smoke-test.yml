name: Main Website Proof Card 006 Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/add_goalos_agialpha_main_site_proof_cards_v12.py"
      - "scripts/verify_goalos_agialpha_main_site_proof_cards_v12.py"
      - "docs/examples/proof-card-006-sovereign-enterprise-rsi-operating-system.md"
      - "data/examples/proof-card-006-sovereign-enterprise-rsi-operating-system.json"
      - "evidence/examples/proof-card-006-evidence-docket-template.json"
      - ".github/workflows/main-website-proof-card-006-smoke-test.yml"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Build local synthetic main website with Proof Cards 001-006
        run: python3 scripts/add_goalos_agialpha_main_site_proof_cards_v12.py --site smoke-site --bootstrap
      - name: Verify Proof Cards 001-006
        run: python3 scripts/verify_goalos_agialpha_main_site_proof_cards_v12.py --site smoke-site
