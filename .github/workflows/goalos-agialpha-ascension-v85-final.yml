name: GoalOS AGIALPHA Ascension v85 Final

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "assets/**"
      - "downloads/**"
      - "docs/**"
      - "scripts/build_goalos_agialpha_ascension_website_v85.py"
      - "scripts/verify_goalos_agialpha_ascension_website_v85.py"
      - "scripts/visual_layout_check_v85.py"
      - ".github/workflows/goalos-agialpha-ascension-v85-final.yml"

permissions: {}

concurrency:
  group: goalos-agialpha-ascension-v85-final
  cancel-in-progress: false

jobs:
  build:
    name: Build, verify, and visually audit v85
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install deterministic QA dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright beautifulsoup4
          python -m playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Build public site
        run: python scripts/build_goalos_agialpha_ascension_website_v85.py --out site

      - name: Verify public site
        run: python scripts/verify_goalos_agialpha_ascension_website_v85.py --site site

      - name: Run browser layout and visual QA
        run: python scripts/visual_layout_check_v85.py --site site

      - name: Reject archives in public site
        shell: bash
        run: |
          if find site -type f \( -iname '*.zip' -o -iname '*.tar' -o -iname '*.gz' -o -iname '*.7z' \) -print | grep -q .; then
            echo "Public site contains an archive." >&2
            exit 1
          fi

      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goalos-v85-qa-evidence
          path: |
            site/qa/**
            docs/*V85*.md
          if-no-files-found: warn
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy v85 to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
