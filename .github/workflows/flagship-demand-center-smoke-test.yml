name: Flagship Demand Center Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_triple_proof_card_site_v8.py"
      - "scripts/verify_goalos_agialpha_triple_proof_card_site_v8.py"
      - "docs/examples/**"
      - "data/examples/**"
      - "evidence/examples/**"
      - ".github/workflows/triple-proof-card-demand-center-smoke-test.yml"

jobs:
  smoke-test:
    name: Build and verify without deploying
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build Triple Proof Card Demand Center
        run: python3 scripts/build_goalos_agialpha_triple_proof_card_site_v8.py --out site
      - name: Verify complete website
        run: python3 scripts/verify_goalos_agialpha_triple_proof_card_site_v8.py --site site
      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: triple-proof-card-demand-center-preview
          path: site
