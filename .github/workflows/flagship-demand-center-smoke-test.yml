name: Flagship Demand Center Smoke Test
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_flagship_demand_center_v7.py"
      - "scripts/verify_goalos_agialpha_flagship_demand_center_v7.py"
      - "docs/examples/**"
      - "data/examples/**"
      - "evidence/examples/**"
permissions:
  contents: read
jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build flagship demand center locally
        run: python3 scripts/build_goalos_agialpha_flagship_demand_center_v7.py --out site
      - name: Verify generated website
        run: python3 scripts/verify_goalos_agialpha_flagship_demand_center_v7.py --site site
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: flagship-demand-center-preview
          path: site
