            [[ "$(head -c 5 "$source_dir/$pdf")" == '%PDF-' ]] || { echo "Invalid PDF signature: $pdf"; exit 1; }
          done
          for image in cover-institutional-use-case-edition-v3.png kernel-v3-figure-gallery.jpg kernel-v3-use-case-gallery.jpg; do
            cmp -s "$source_dir/$image" "$target/$image" || { echo "Pinned publication visual differs from canonical source: $image"; exit 1; }
          done

      - name: Extend the active v86 preservation pipeline—without replacing it
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/website/patch_v86_for_sme_kernel_v3_publication.py \
            --workflow "$ACTIVE_WORKFLOW" \
            --require-sha256 "$EXPECTED_ACTIVE_WORKFLOW_SHA256"
          echo "$EXPECTED_PATCHED_WORKFLOW_SHA256  $ACTIVE_WORKFLOW" | sha256sum --check --strict
          python3 scripts/website/patch_v86_for_sme_kernel_v3_publication.py \
            --workflow "$ACTIVE_WORKFLOW" \
            --check

      - name: Validate the complete installation before any branch is pushed
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile \
            scripts/website/build_sme_kernel_v3_publication.py \
            scripts/website/snapshot_sme_kernel_v3_publication_site.py \
            scripts/website/verify_sme_kernel_v3_publication.py \
            scripts/website/visual_check_sme_kernel_v3_publication.py \
            scripts/website/patch_v86_for_sme_kernel_v3_publication.py \
            test/test_sme_kernel_v3_publication_website.py
          node --check website/features/sme-kernel-v3-publication/assets/sme-kernel-v3-publication.js
          python3 scripts/website/verify_sme_kernel_v3_publication.py \
            --root . \
            --source-only \
            --output "$RUNNER_TEMP/source-verification-postpatch.json"
          python3 -m unittest discover -s test -p 'test_sme_kernel_v3_publication_website.py' -v | tee "$RUNNER_TEMP/unit-tests.txt"
          ruby -e "require 'yaml'; YAML.load_file('$ACTIVE_WORKFLOW'); YAML.load_file('.github/workflows/goalos-sme-kernel-v3-institutional-publication-smoke-test.yml'); puts 'YAML PASS'"
          git diff --check
          test "$(grep -c 'GOALOS_SME_KERNEL_V3_PUBLICATION_BUILD_START' "$ACTIVE_WORKFLOW")" -eq 1
          test "$(grep -c 'GOALOS_SME_KERNEL_V3_PUBLICATION_PATHS_START' "$ACTIVE_WORKFLOW")" -eq 1
          test "$(grep -c 'GOALOS_SME_KERNEL_V3_PUBLICATION_ARTIFACTS_START' "$ACTIVE_WORKFLOW")" -eq 1
          test "$(grep -c 'GOALOS_SME_KERNEL_V3_PUBLICATION_KERNEL_LINK_START' website/features/sme-kernel-v3-publication/templates/base.html || true)" -eq 0

      - name: Create installation evidence for human review
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/goalos-kernel-v3-publication-r2-installation-evidence"
          mkdir -p "$evidence"
          cp "$RUNNER_TEMP/source-verification-prepatch.json" "$evidence/"
          cp "$RUNNER_TEMP/source-verification-postpatch.json" "$evidence/"
          cp "$RUNNER_TEMP/unit-tests.txt" "$evidence/"
          cp "$RELEASE_PATH" "$evidence/"
          cp "$RUNNER_TEMP/goalos-canonical-publication-r2"/canonical-publication-artifacts.* "$evidence/"
          sha256sum "$RUNNER_TEMP/goalos-publication-r2-payload.tar.gz" > "$evidence/installer-payload.sha256"
          git rev-parse HEAD > "$evidence/current-main-commit.txt"
          git show -s --format='%H%n%cI%n%s' "$AUDITED_BASELINE_COMMIT" > "$evidence/audited-baseline.txt"
          {
            echo "repository=$GITHUB_REPOSITORY"
            echo "audited_snapshot_sha256=$AUDITED_SNAPSHOT_SHA256"
            echo "kernel_content_sha256=$EXPECTED_KERNEL_CONTENT_SHA256"
            echo "protected_kernel_source_set_sha256=$EXPECTED_PROTECTED_KERNEL_SET_SHA256"
            echo "canonical_v86_tree_sha256=$EXPECTED_V86_TREE_SHA256"
          } > "$evidence/repository-boundaries.txt"
          git diff --stat > "$evidence/diff-stat.txt"
          git diff -- "$ACTIVE_WORKFLOW" > "$evidence/v86-workflow.patch"
          git status --short > "$evidence/git-status.txt"
          sha256sum "$ACTIVE_WORKFLOW" > "$evidence/patched-workflow.sha256"

      - name: Upload the review evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goalos-kernel-v3-institutional-publication-r2-installation-evidence
          path: ${{ runner.temp }}/goalos-kernel-v3-publication-r2-installation-evidence/
          if-no-files-found: error
          retention-days: 30

      - name: Commit the reviewable integration to a dedicated branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          branch="automation/kernel-v3-institutional-publication-r2-${GITHUB_RUN_ID}"
          stage="$RUNNER_TEMP/goalos-publication-r2-stage"
          bootstrap_path="${GITHUB_WORKFLOW_REF#"$GITHUB_REPOSITORY/"}"
          bootstrap_path="${bootstrap_path%@*}"
          test -f "$bootstrap_path" || { echo "Cannot identify bootstrap workflow at $bootstrap_path"; exit 1; }
          git switch -c "$branch"
          git rm "$bootstrap_path"
          git add -- "$ACTIVE_WORKFLOW"
          while IFS= read -r -d '' staged; do
            relative="${staged#"$stage/"}"
            git add -- "$relative"
          done < <(find "$stage" -type f -print0)
          {
            printf '%s\n' "$bootstrap_path" "$ACTIVE_WORKFLOW"
            find "$stage" -type f -printf '%P\n'
          } | sort -u > "$RUNNER_TEMP/expected-staged-paths.txt"
          git diff --cached --name-only | sort -u > "$RUNNER_TEMP/observed-staged-paths.txt"
          diff -u "$RUNNER_TEMP/expected-staged-paths.txt" "$RUNNER_TEMP/observed-staged-paths.txt"
          git diff --cached --check
          git config user.name 'GoalOS Publication Integrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Add repository-aligned Kernel v3 institutional publication R2'
          git push --set-upstream origin "$branch"
          echo "name=$branch" >> "$GITHUB_OUTPUT"

      - name: Open the human-review pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.branch.outputs.name }}
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/pr-body.md" <<'BODY'
          ## GoalOS Kernel v3 · Institutional Publication Suite v3.0 · Repository Integration R2

          This preservation-first integration is aligned to the current **GoalOS SME Kernel v3 Autonomous End-to-End Constellation v3.2.0** and extends the active **v86 Pages pipeline** only after all existing constitutional engines have been built and verified.

          ### Public surfaces
          - Flagship institutional paper gateway
          - Ten-use-case and seven-case-study operating atlas
          - Publication proof ledger with canonical URLs, SHA-256 provenance, citation, validation evidence, and explicit non-claims
          - Elite homepage gateway and `Institutional Paper` navigation entry
          - Cross-links from all five executable Kernel surfaces
          - Six-stage repository-derived constellation: Identify → Out-Learn → Out-Think → Out-Design → Out-Strategise → Out-Execute
          - Explicit lineage from META-AGENTIC α-AGI, AGI Alpha Node, and AGI Jobs into GoalOS AGIALPHA Ascension

          ### Preservation and release discipline
          - No existing page removed
          - No competing Pages deployer
          - No direct edit to `website/v86_actual_site/**`
          - Active v86 workflow patched only after exact SHA-256 verification
          - Eighteen protected Kernel source files and the canonical v86 tree verified against audited digests
          - Three principal PDFs verified by SHA-256, byte size, and PDF signature at installation time
          - Three publication visuals pinned byte-for-byte to the canonical suite
          - No production build-time network fetches
          - Pre-build preservation snapshot and five-manifest constitutional reconciliation
          - Source, static, semantic, provenance, security, regression, and 15 responsive-browser gates
          - Bootstrap installer removes itself from this pull request

          ### Human review sequence
          This pull request is deliberately opened as a **draft**. Inspect **Files changed**, especially the v86 workflow diff, and download the installation-evidence artifact from the installer run. Then click **Ready for review**, wait for the source gate to pass, and merge only when every required check is green. The existing v86 workflow performs the final full-site build, browser QA, artifact upload, and Pages deployment after merge.
          BODY
          if url=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --draft \
            --title 'GoalOS Kernel v3 · Institutional Publication Suite v3.0 · R2' \
            --body-file "$RUNNER_TEMP/pr-body.md"); then
            echo "url=$url" >> "$GITHUB_OUTPUT"
          else
            compare="https://github.com/$GITHUB_REPOSITORY/compare/main...$BRANCH?expand=1"
            echo 'Automatic pull-request creation is disabled for GitHub Actions in this repository.'
            echo "The validated branch was pushed successfully. Open: $compare"
            echo "url=$compare" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish the installer result
        if: always()
        shell: bash
        run: |
          {
            echo '# GoalOS Kernel v3 Institutional Publication R2 · Installation Result'
            echo
            echo "- Release: \`$RELEASE_ID\`"
            echo "- Audited baseline: \`$AUDITED_BASELINE_COMMIT\`"
            echo "- Repository: \`$GITHUB_REPOSITORY\`"
            echo "- Review branch: \`${{ steps.branch.outputs.name || 'not-created' }}\`"
            echo "- Pull request or compare page: ${{ steps.pr.outputs.url || 'not-created' }}"
            echo '- The live website was not modified by this installer run.'
            echo '- Review Files changed and the installation-evidence artifact.'
            echo '- Click Ready for review and merge only after every required check is green.'
            echo '- The existing v86 Pages workflow performs final build, browser QA, and deployment after merge.'
          } >> "$GITHUB_STEP_SUMMARY"
