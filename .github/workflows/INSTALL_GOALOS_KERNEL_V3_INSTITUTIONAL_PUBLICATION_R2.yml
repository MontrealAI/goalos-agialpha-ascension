name: Install GoalOS Kernel v3 Institutional Publication R2 · Open Draft Review PR

on:
  workflow_dispatch:

concurrency:
  group: install-goalos-kernel-v3-institutional-publication-r2
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  EXPECTED_REPOSITORY: MontrealAI/goalos-agialpha-ascension
  AUDITED_BASELINE_COMMIT: 076a7a7a8d1713d4849e95e1c58b8b6ccec0df03
  AUDITED_SNAPSHOT_SHA256: f14146ea523468353ff5b6cb96538be043c9de3a7c6b71598bbe91616b5fb993
  ACTIVE_WORKFLOW: .github/workflows/goalos-agialpha-ascension-v86-final.yml
  EXPECTED_ACTIVE_WORKFLOW_SHA256: aa5695af1d7b8967149020fffd57d521e67b648eb3229dde75cec47dd3b5dca2
  EXPECTED_PATCHED_WORKFLOW_SHA256: 3329167be2088b38a2a0d7abe2fbb9f9f4845e4576181ee058049d022b32c77f
  EXPECTED_KERNEL_CONTENT_SHA256: 96f8c3c97ef6a0dc0c65a62943dc2305189cf9a12b48ed1e9706983719ce35f3
  EXPECTED_PROTECTED_KERNEL_SET_SHA256: fc6159ff1e86be5b67f64f5ff5a909e6340c2e6f7dc59f841063d2219889b25d
  EXPECTED_V86_TREE_SHA256: 8c739851e833ba11936039a7ef085a6f5db0b526a467c27c2b9c3aceded9c42e
  EXPECTED_RELEASE_MANIFEST_SHA256: 9deefd544e2259eae8d065d134dcf87239b0da1864ab65f9c55b62fef1319fd5
  PAYLOAD_SHA256: 86847c15a8c8873f9b11b87014eb0ad0b36d3a0d044d69fbfa01da0c87f240f8
  RELEASE_ID: GOALOS-AGIALPHA-SME-KERNEL-V3-INSTITUTIONAL-PUBLICATION-V3.0-R2
  RELEASE_PATH: release/kernel-v3-institutional-publication-v3.0.0-r2/RELEASE_MANIFEST.json

jobs:
  install-and-open-pr:
    name: Verify, install, test, and open a preservation-first draft PR
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout the current main branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Fail closed unless the live repository still matches the audited boundaries
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REPOSITORY" == "$EXPECTED_REPOSITORY" ]] || { echo "This installer is bound to $EXPECTED_REPOSITORY, not $GITHUB_REPOSITORY."; exit 1; }
          [[ "$GITHUB_REF" == 'refs/heads/main' ]] || { echo 'Run this installer from the main branch.'; exit 1; }
          [[ -z "$(git status --porcelain)" ]] || { echo 'The checkout is unexpectedly dirty.'; git status --short; exit 1; }
          git cat-file -e "$AUDITED_BASELINE_COMMIT^{commit}"
          git merge-base --is-ancestor "$AUDITED_BASELINE_COMMIT" HEAD || { echo "Current main no longer descends from audited baseline $AUDITED_BASELINE_COMMIT."; exit 1; }
          test -s "$ACTIVE_WORKFLOW" || { echo "Missing active v86 Pages workflow: $ACTIVE_WORKFLOW"; exit 1; }
          if grep -q 'GOALOS_SME_KERNEL_V3_PUBLICATION_BUILD_START' "$ACTIVE_WORKFLOW"; then
            echo 'The R2 institutional publication integration already appears to be installed. No files were changed.'
            exit 1
          fi
          echo "$EXPECTED_ACTIVE_WORKFLOW_SHA256  $ACTIVE_WORKFLOW" | sha256sum --check --strict
          echo "$EXPECTED_KERNEL_CONTENT_SHA256  content/sme-kernel-v3.json" | sha256sum --check --strict

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Materialize the audited, reviewable R2 source package
        shell: bash
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/goalos-publication-r2-stage"
          archive="$RUNNER_TEMP/goalos-publication-r2-payload.tar.gz"
          mkdir -p "$stage"
