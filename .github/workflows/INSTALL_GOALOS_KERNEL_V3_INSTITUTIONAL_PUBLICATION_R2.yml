            --source-only \
            --output "$RUNNER_TEMP/source-verification-prepatch.json"

      - name: Verify the canonical paper suite and all pinned publication visuals
        shell: bash
        run: |
          set -euo pipefail
          source_dir="$RUNNER_TEMP/goalos-canonical-publication-r2"
          target='website/features/sme-kernel-v3-publication/assets'
          mkdir -p "$source_dir"
          fetch() {
            curl --fail --location --silent --show-error --retry 4 --retry-delay 2 --retry-all-errors --proto '=https' --tlsv1.2 "$1" --output "$2"
          }
          fetch 'https://montrealai.github.io/GoalOS-AGIALPHA-Sovereign-Machine-Economy-Kernel-v3-Paper-Institutional-Use-Case-Edition-v3.0/01_PAPER/GoalOS_AGIALPHA_Sovereign_Machine_Economy_Kernel_v3_Paper_Institutional_Use_Case_Edition_v3.0.pdf' "$source_dir/flagship-institutional-edition-v3.pdf"
