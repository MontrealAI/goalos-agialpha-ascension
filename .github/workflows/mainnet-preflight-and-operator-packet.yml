name: Mainnet Preflight and Operator Packet
on:
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [preflight, final_check, package_operator_instructions]
        required: true
permissions:
  contents: read
concurrency:
  group: goalos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  mainnet-preflight:
    environment: mainnet-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm run test:ci
      - run: npm run static-check
      - run: echo "This workflow cannot deploy Ethereum Mainnet. Final Ethereum Mainnet deployment must be local-only operator broadcast."
      - name: Run real no-broadcast Mainnet preflight
        if: inputs.mode == 'preflight'
        env:
          STRICT_MAINNET_PREFLIGHT: "1"
          PRIVATE_MAINNET_RPC_URL: ${{ secrets.MAINNET_PREFLIGHT_RPC_URL }}
          MAINNET_RPC_URL: ${{ vars.MAINNET_PREFLIGHT_RPC_URL }}
        run: npm run deploy:mainnet:preflight
      - run: npm run mainnet:final-check
        if: inputs.mode == 'final_check'
      - run: npm run deploy:mainnet:prepare-local
        if: inputs.mode == 'package_operator_instructions'
      - uses: actions/upload-artifact@v4
        with:
          name: redacted-mainnet-operator-packet
          path: |
            .private/mainnet-operator.env.template
            .private/mainnet-operator-checklist.md
            .private/mainnet-final-command.txt
            .private/mainnet-preflight-summary.redacted.json
          if-no-files-found: ignore
