name: GoalOS Autonomous Website Autopilot
on:
  workflow_dispatch:
    inputs:
      open_pull_request:
        description: Open a human-review pull request for generated mission-os.html
        type: boolean
        default: false
permissions:
  contents: write
  pull-requests: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/mission-os/generate_mission_page.py
      - run: test -s mission-os.html
      - name: Open human-review PR
        if: ${{ inputs.open_pull_request }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Generate GoalOS Mission OS public page"
          title: "Generate GoalOS Mission OS public page"
          body: "Generated from content/mission-os.page.json. Human review required before merge; no auto-merge."
          branch: goalos-mission-os/website-autopilot
          add-paths: mission-os.html
