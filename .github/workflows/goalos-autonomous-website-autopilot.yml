name: GoalOS Autonomous Website Autopilot
on:
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python scripts/mission-os/generate_mission_page.py
      - run: test -s mission-os.html
