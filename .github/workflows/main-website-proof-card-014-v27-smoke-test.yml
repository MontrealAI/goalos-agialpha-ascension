name: Main Website Proof Card 014 v27 Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "site-assets/proof-pages/**"
      - "scripts/integrate_goalos_agialpha_proof_card_014_v27.py"
      - "scripts/verify_goalos_agialpha_proof_card_014_v27.py"
      - ".github/workflows/main-website-proof-card-014-v27-smoke-test.yml"

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create minimal existing site
        run: |
          mkdir -p site
          cat > site/index.html <<'HTML'
          <!doctype html><html><head><meta charset="utf-8"><title>GoalOS AGIALPHA Ascension</title></head><body><main><h1>Existing premium main website</h1></main></body></html>
          HTML

      - name: Integrate proof-card atlas
        run: python3 scripts/integrate_goalos_agialpha_proof_card_014_v27.py --site site

      - name: Verify proof-card atlas
        run: python3 scripts/verify_goalos_agialpha_proof_card_014_v27.py --site site
