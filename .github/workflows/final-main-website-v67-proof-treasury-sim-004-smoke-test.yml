name: Final Main Website v67 Proof Treasury Simulation 004 Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_final_main_website_v67.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v67.py"
      - ".github/workflows/final-main-website-v67-proof-treasury-sim-004-smoke-test.yml"
      - "data/proof-treasury-simulation-004/**"
      - "evidence/proof-treasury-simulation-004/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build site
        run: python3 scripts/build_goalos_agialpha_final_main_website_v67.py --out site
      - name: Verify site
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v67.py --site site
      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files."; exit 1
          fi
