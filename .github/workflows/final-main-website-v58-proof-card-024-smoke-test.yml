name: Final Main Website v58 Proof Card 024 Ascension Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_final_main_website_v58.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v58.py"
      - ".github/workflows/final-main-website-v58-proof-card-024-smoke-test.yml"
      - "docs/papers/mission-os/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build site
        run: python3 scripts/build_goalos_agialpha_final_main_website_v58.py --out site
      - name: Verify site
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v58.py --site site
      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files."; exit 1
          fi
