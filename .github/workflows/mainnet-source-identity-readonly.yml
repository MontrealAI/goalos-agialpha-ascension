name: Mainnet Source Identity Readonly
on:
  workflow_dispatch:
jobs:
  source-identity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run mainnet:source-identity:doctor
        env:
          PRIMARY_MAINNET_RPC_URL: ${{ secrets.PRIMARY_MAINNET_RPC_URL }}
          SECONDARY_MAINNET_RPC_URL: ${{ secrets.SECONDARY_MAINNET_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      - run: npm run mainnet:source-identity:all
        env:
          PRIMARY_MAINNET_RPC_URL: ${{ secrets.PRIMARY_MAINNET_RPC_URL }}
          SECONDARY_MAINNET_RPC_URL: ${{ secrets.SECONDARY_MAINNET_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
