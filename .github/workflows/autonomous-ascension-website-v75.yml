name: Autonomous Ascension Website v75 Apex

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "*.html"
      - "assets/**"
      - "downloads/**"
      - "resources/**"
      - "evidence/**"
      - "data/**"
      - "routes.json"
      - "sitemap.xml"
      - "robots.txt"
      - "manifest.webmanifest"
      - "site-status.json"
      - "scripts/build_goalos_agialpha_ascension_website_v75_apex.py"
      - "scripts/verify_goalos_agialpha_ascension_website_v75_apex.py"
      - ".github/workflows/autonomous-ascension-website-v75.yml"

concurrency:
  group: autonomous-ascension-website-v75-apex
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build and verify v75 Apex website
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build public website artifact
        run: python3 scripts/build_goalos_agialpha_ascension_website_v75_apex.py --out site

      - name: Verify public website artifact
        run: python3 scripts/verify_goalos_agialpha_ascension_website_v75_apex.py --site site

      - name: Run repository claim-boundary checks when available
        run: |
          if [ -f package.json ] && npm run | grep -q "deployment:claim-boundary:check"; then
            npm run deployment:claim-boundary:check
          else
            echo "deployment:claim-boundary:check not available; skipped."
          fi
          if [ -f package.json ] && npm run | grep -q "repo:no-paid-products"; then
            npm run repo:no-paid-products
          else
            echo "repo:no-paid-products not available; skipped."
          fi

      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files." >&2
            exit 1
          fi

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ascension-website-v75-apex-qa
          path: |
            site/qa/QA_ASCENSION_WEBSITE_v75_APEX.json
            site/qa/QA_ASCENSION_WEBSITE_v75_APEX.md
          if-no-files-found: ignore

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy v75 Apex website to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
