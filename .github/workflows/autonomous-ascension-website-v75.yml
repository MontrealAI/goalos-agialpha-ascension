name: Autonomous Ascension Website v75

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/build_goalos_agialpha_ascension_website_v75.py"
      - "scripts/verify_goalos_agialpha_ascension_website_v75.py"
      - "docs/**"
      - "data/**"
      - "website/**"
      - "assets/**"
      - "site-assets/**"
      - "proof-card-*.html"
      - "mission-os.html"
      - "index.html"
      - ".github/workflows/autonomous-ascension-website-v75.yml"

concurrency:
  group: goalos-ascension-website-v75
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build Ascension website v75
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build website
        run: python3 scripts/build_goalos_agialpha_ascension_website_v75.py --out site

      - name: Verify website
        run: python3 scripts/verify_goalos_agialpha_ascension_website_v75.py --site site

      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files." >&2
            exit 1
          fi

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ascension-website-v75-qa
          path: |
            site/qa/QA_ASCENSION_WEBSITE_v75.json
            site/qa/QA_ASCENSION_WEBSITE_v75.md
          if-no-files-found: ignore

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy Ascension website v75 to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
