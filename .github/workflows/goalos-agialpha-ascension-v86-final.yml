      - 'content/proof-mission-006-long-horizon.json'
      - 'content/proof-mission-007-civilizational-covenant.json'
      - 'content/proof-mission-008-open-future.json'
      - 'data/mainnet/v4.4.0-mainnet-2026-06-21.json'
