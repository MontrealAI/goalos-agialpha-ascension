            site/assets/sme-kernel-v3.css
            site/assets/sme-kernel-v3.js
            site/assets/sme-kernel-v3-core.js
            site/assets/sme-kernel-v3-adapters.js
            site/assets/sme-kernel-v3-worker.js
            site/data/sme-kernel-v3.json
            site/downloads/sme-kernel-v3/
            site/assets/first-real-loop/
            site/downloads/first-real-loop/
            site/downloads/agi-alpha-node-v0/
            site/downloads/proof-gradient/
            site/downloads/proof-missions/
            site/qa/
          if-no-files-found: error
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy v86 to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-verify-browser-test
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
