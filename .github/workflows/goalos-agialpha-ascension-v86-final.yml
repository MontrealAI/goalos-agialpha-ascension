      - 'test/test_proof_mission_005.py'
      - 'test/test_proof_mission_006.py'
      - 'test/test_proof_mission_007.py'
      - 'test/test_proof_mission_008.py'
      - 'docs/PROOF_GRADIENT_SOVEREIGN_WEBSITE.md'
      - 'docs/PROOF_MISSION_002_ASCENSION_PROTOCOL_WEBSITE.md'
      - 'docs/PROOF_MISSION_003_CAPABILITY_CONSTELLATION_WEBSITE.md'
      - 'docs/PROOF_MISSION_004_SOVEREIGN_INSTITUTION_WEBSITE.md'
      - 'docs/PROOF_MISSION_005_INTERINSTITUTIONAL_ACCORD_WEBSITE.md'
      - 'docs/PROOF_MISSION_006_LONG_HORIZON_WEBSITE.md'
      - 'docs/PROOF_MISSION_007_CIVILIZATIONAL_COVENANT_WEBSITE.md'
      - 'docs/PROOF_MISSION_008_OPEN_FUTURE_WEBSITE.md'
      - 'config/ethereum-mainnet.contracts.json'
      - 'release/mainnet-2026-06-21/CONTRACTS_MAINNET.json'
      - 'release/mainnet-2026-06-21/RELEASE_MANIFEST.json'
      - 'release/mainnet-2026-06-21/DEPLOYMENT_EVIDENCE.json'
      - 'scripts/add_goalos_ethereum_mainnet_pages_v87.py'
      - 'scripts/verify_goalos_ethereum_mainnet_pages_v87.py'
      - 'scripts/browser_check_goalos_ethereum_mainnet_v87.py'
      - 'test/test_ethereum_mainnet_website_restore.py'
      - 'docs/ETHEREUM_MAINNET_WEBSITE_RESTORE.md'
      - 'content/meta-agentic-alpha-agi.json'
      - 'website/features/meta-agentic-alpha-agi/**'
      - 'scripts/website/build_meta_agentic_alpha_agi.py'
      - 'scripts/website/verify_meta_agentic_alpha_agi.py'
      - 'scripts/website/visual_check_meta_agentic_alpha_agi.py'
      - 'test/test_meta_agentic_alpha_agi_website.py'
      - 'docs/META_AGENTIC_ALPHA_AGI_WEBSITE.md'
      - 'README_UPLOAD_META_AGENTIC_ALPHA_AGI.md'
      - 'content/agi-alpha-node-v0.json'
      - 'website/features/agi-alpha-node-v0/**'
      - 'scripts/website/build_agi_alpha_node_v0.py'
      - 'scripts/website/snapshot_agi_alpha_node_v0_site.py'
      - 'scripts/website/verify_agi_alpha_node_v0.py'
      - 'scripts/website/visual_check_agi_alpha_node_v0.py'
      - 'test/test_agi_alpha_node_v0_website.py'
      - 'docs/AGI_ALPHA_NODE_V0_WEBSITE.md'
      - 'README_UPLOAD_AGI_ALPHA_NODE_V0.md'
      - 'content/goalos-first-real-loop.json'
      - 'website/first_real_loop/**'
      - 'scripts/website/build_goalos_first_real_loop.py'
      - 'scripts/website/verify_goalos_first_real_loop.py'
      - 'scripts/website/browser_check_goalos_first_real_loop.py'
      - 'schemas/goalos-first-real-loop-evidence-docket.schema.json'
      - 'test/test_goalos_first_real_loop.py'
      - 'docs/GOALOS_FIRST_REAL_LOOP_WEBSITE.md'
      - '.github/workflows/goalos-first-real-loop-smoke-test.yml'
      - 'content/agi-jobs-v0-v2.json'
      - 'website/features/agi-jobs-v0-v2/**'
      - 'scripts/website/build_agi_jobs_v0_v2.py'
      - 'scripts/website/snapshot_agi_jobs_v0_v2_site.py'
      - 'scripts/website/verify_agi_jobs_v0_v2.py'
      - 'scripts/website/visual_check_agi_jobs_v0_v2.py'
      - 'test/test_agi_jobs_v0_v2_website.py'
      - 'schemas/agi-jobs-v0-v2-evidence-docket.schema.json'
      - 'docs/AGI_JOBS_V0_V2_WEBSITE.md'
      - 'README_UPLOAD_AGI_JOBS_V0_V2.md'
      - '.github/workflows/goalos-agi-jobs-v0-v2-smoke-test.yml'
      - '.github/workflows/goalos-agialpha-ascension-v86-final.yml'
      - '.github/workflows/goalos-agialpha-ascension-v86-smoke-test.yml'

concurrency:
  group: goalos-agialpha-ascension-v86
  cancel-in-progress: false

permissions: {}

env:
  PYTHONUNBUFFERED: '1'

jobs:
  build-verify-browser-test:
    name: Build, preserve, verify, and browser-test v86
    runs-on: ubuntu-latest
    timeout-minutes: 145
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile flagship website tooling under Python 3.11
        run: |
          python3 -m py_compile \
            scripts/website/build_meta_agentic_alpha_agi.py \
            scripts/website/verify_meta_agentic_alpha_agi.py \
            scripts/website/visual_check_meta_agentic_alpha_agi.py \
            scripts/website/build_agi_alpha_node_v0.py \
            scripts/website/snapshot_agi_alpha_node_v0_site.py \
            scripts/website/verify_agi_alpha_node_v0.py \
            scripts/website/visual_check_agi_alpha_node_v0.py \
            scripts/website/build_goalos_first_real_loop.py \
            scripts/website/verify_goalos_first_real_loop.py \
            scripts/website/browser_check_goalos_first_real_loop.py \
            scripts/website/build_agi_jobs_v0_v2.py \
            scripts/website/snapshot_agi_jobs_v0_v2_site.py \
            scripts/website/verify_agi_jobs_v0_v2.py \
            scripts/website/visual_check_agi_jobs_v0_v2.py
          node --check website/features/agi-jobs-v0-v2/assets/agi-jobs-v0-v2.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Record canonical v86 source digest
        shell: bash
        run: |
          set -euo pipefail
          find website/v86_actual_site -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum > "$RUNNER_TEMP/v86-source.before"

      - name: Build preserved actual website
        run: python3 scripts/build_goalos_agialpha_ascension_website_v86.py --out site

      - name: Add Public Proof Mission 001 additively
        run: python3 scripts/website/build_proof_gradient_sovereign.py --site site

      - name: Add Public Proof Mission 002 additively
        run: python3 scripts/website/build_proof_mission_002.py --site site

      - name: Add Public Proof Mission 003 and generate the three-mission hub
        run: python3 scripts/website/build_proof_mission_003.py --site site

      - name: Verify canonical content and Missions 001–003
        run: |
          python3 scripts/verify_goalos_agialpha_ascension_website_v86.py --site site
          python3 scripts/website/verify_proof_gradient_sovereign.py --site site
          python3 scripts/website/verify_proof_mission_002.py --site site
          python3 scripts/website/verify_proof_mission_003.py --site site

      - name: Run Missions 001–003 regression tests
        run: |
          python3 -m unittest discover -s test -p 'test_proof_gradient_sovereign.py' -v
          python3 -m unittest discover -s test -p 'test_proof_mission_002.py' -v
          python3 -m unittest discover -s test -p 'test_proof_mission_003.py' -v

      - name: Install Playwright Chromium
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Run canonical and Missions 001–003 browser QA
        run: |
          python3 scripts/visual_layout_check_v86.py --site site --screenshots
          python3 scripts/website/visual_check_proof_gradient_sovereign.py --site site --screenshots
          python3 scripts/website/visual_check_proof_mission_002.py --site site --screenshots
          python3 scripts/website/visual_check_proof_mission_003.py --site site --screenshots

      - name: Add and verify Public Proof Mission 004
        run: |
          python3 scripts/website/build_proof_mission_004.py --site site
          python3 scripts/website/verify_proof_mission_004.py --site site
          python3 -m unittest discover -s test -p 'test_proof_mission_004.py' -v
          python3 scripts/website/visual_check_proof_mission_004.py --site site --screenshots

      - name: Add and verify Public Proof Mission 005
        run: |
          python3 scripts/website/build_proof_mission_005.py --site site
          python3 scripts/website/verify_proof_mission_005.py --site site
          python3 -m unittest discover -s test -p 'test_proof_mission_005.py' -v
          python3 scripts/website/visual_check_proof_mission_005.py --site site --screenshots

      - name: Build Public Proof Mission 006 before any Mission 006 verification or browser QA
        run: python3 scripts/website/build_proof_mission_006.py --site site

      - name: Assert Mission 006 generated outputs exist
        shell: bash
        run: |
          set -euo pipefail
          for file in site/proof-mission-006.html site/proof-missions.html site/index.html site/qa/proof-mission-006-build.json; do
            test -s "$file" || { echo "Missing generated Mission 006 output: $file"; find site -maxdepth 2 -type f | sort; exit 1; }
          done

      - name: Verify and browser-test Public Proof Mission 006
        run: |
          python3 scripts/website/verify_proof_mission_006.py --site site --repo .
          python3 -m unittest discover -s test -p 'test_proof_mission_006.py' -v
          python3 scripts/website/visual_check_proof_mission_006.py --site site --output site/qa/proof-mission-006 --screenshots

      - name: Build Public Proof Mission 007 before any Mission 007 verification or browser QA
        run: python3 scripts/website/build_proof_mission_007.py --site site

      - name: Assert Mission 007 generated outputs exist
        shell: bash
        run: |
          set -euo pipefail
          for file in site/proof-mission-007.html site/proof-mission-006.html site/proof-missions.html site/index.html site/qa/proof-mission-007-build.json; do
            test -s "$file" || { echo "Missing generated Mission 007 output: $file"; find site -maxdepth 2 -type f | sort; exit 1; }
          done

      - name: Verify and browser-test Public Proof Mission 007
        run: |
          python3 scripts/website/verify_proof_mission_007.py --site site --repo .
          python3 -m unittest discover -s test -p 'test_proof_mission_007.py' -v
          python3 scripts/website/visual_check_proof_mission_007.py --site site --output site/qa/proof-mission-007 --screenshots

      - name: Build Public Proof Mission 008 before any Mission 008 verification or browser QA
        run: python3 scripts/website/build_proof_mission_008.py --site site

      - name: Assert Mission 008 generated outputs exist
        shell: bash
        run: |
          set -euo pipefail
          for file in site/proof-mission-008.html site/proof-mission-007.html site/proof-missions.html site/index.html site/qa/proof-mission-008-build.json; do
            test -s "$file" || { echo "Missing generated Mission 008 output: $file"; find site -maxdepth 2 -type f | sort; exit 1; }
          done

      - name: Verify and browser-test Public Proof Mission 008
        run: |
          python3 scripts/website/verify_proof_mission_008.py --site site --repo .
          python3 -m unittest discover -s test -p 'test_proof_mission_008.py' -v
          python3 scripts/website/visual_check_proof_mission_008.py --site site --output site/qa/proof-mission-008 --screenshots

      - name: Restore the Ethereum Mainnet deployment record additively
        run: |
          python3 scripts/add_goalos_ethereum_mainnet_pages_v87.py             --site site             --registry config/ethereum-mainnet.contracts.json             --release-contracts release/mainnet-2026-06-21/CONTRACTS_MAINNET.json             --release-manifest release/mainnet-2026-06-21/RELEASE_MANIFEST.json             --deployment-evidence release/mainnet-2026-06-21/DEPLOYMENT_EVIDENCE.json

      - name: Assert the Mainnet record and all eight Proof Missions exist
        shell: bash
        run: |
          set -euo pipefail
          for file in             site/ethereum-mainnet.html             site/proof-gradient-challenge.html             site/proof-mission-002.html             site/proof-mission-003.html             site/proof-mission-004.html             site/proof-mission-005.html             site/proof-mission-006.html             site/proof-mission-007.html             site/proof-mission-008.html             site/proof-missions.html             site/index.html             site/sitemap.xml             site/site-status.json             site/qa/mainnet-page-build-v87.json; do
            test -s "$file" || { echo "Missing generated public-site output: $file"; find site -maxdepth 3 -type f | sort; exit 1; }
          done

      - name: Verify Mainnet restoration and cross-feature preservation
        run: |
          python3 scripts/verify_goalos_ethereum_mainnet_pages_v87.py             --site site             --registry config/ethereum-mainnet.contracts.json
          python3 -m unittest discover -s test -p 'test_ethereum_mainnet_website_restore.py' -v

      - name: Browser-test the restored Mainnet record
        run: python3 scripts/browser_check_goalos_ethereum_mainnet_v87.py --site site --screenshots

      - name: Detect optional META-Agentic α-AGI release
        shell: bash
        run: |
          set -euo pipefail
          required=(
            content/meta-agentic-alpha-agi.json
            website/features/meta-agentic-alpha-agi/templates/meta-agentic-alpha-agi.html
            website/features/meta-agentic-alpha-agi/templates/meta-agentic-alpha-agi-architecture.html
            website/features/meta-agentic-alpha-agi/assets/meta-agentic-alpha-agi.css
            website/features/meta-agentic-alpha-agi/assets/meta-agentic-alpha-agi.js
            scripts/website/build_meta_agentic_alpha_agi.py
            scripts/website/verify_meta_agentic_alpha_agi.py
            scripts/website/visual_check_meta_agentic_alpha_agi.py
            test/test_meta_agentic_alpha_agi_website.py
          )
          present=0
          for file in "${required[@]}"; do
            [[ -f "$file" ]] && present=$((present + 1))
          done
          if (( present == 0 )); then
            state=none
          elif (( present == ${#required[@]} )); then
            state=complete
          else
            echo "Partial META-Agentic installation detected ($present/${#required[@]} required files). Refusing a mixed release."
            printf 'Required: %s\n' "${required[@]}"
            exit 1
          fi
          echo "META_AGENTIC_STATE=$state" >> "$GITHUB_ENV"
          echo "META-Agentic release state: $state"

      - name: Build optional META-Agentic α-AGI release additively
        if: env.META_AGENTIC_STATE == 'complete'
        run: SOURCE_DATE_EPOCH=1782172800 python3 scripts/website/build_meta_agentic_alpha_agi.py --site site

      - name: Verify, regression-test, and browser-test optional META-Agentic α-AGI
        if: env.META_AGENTIC_STATE == 'complete'
        run: |
          python3 scripts/website/verify_meta_agentic_alpha_agi.py --site site
          python3 -m unittest discover -s test -p 'test_meta_agentic_alpha_agi_website.py' -v
          python3 scripts/website/visual_check_meta_agentic_alpha_agi.py --site site --output site/qa/meta-agentic-alpha-agi

      - name: Snapshot the complete generated site before AGI Alpha Node v0
        run: python3 scripts/website/snapshot_agi_alpha_node_v0_site.py --site site --output "$RUNNER_TEMP/agi-alpha-node-v0-prebuild.json"

      - name: Build GoalOS AGIALPHA Ascension AGI Alpha Node v0 Sovereign Citadel
        run: SOURCE_DATE_EPOCH=1782216000 python3 scripts/website/build_agi_alpha_node_v0.py --site site --root .

      - name: Assert AGI Alpha Node v0 Sovereign Citadel outputs exist
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            site/agi-alpha-node-v0.html \
            site/agi-alpha-node-v0-architecture.html \
            site/agi-alpha-node-v0-proof-ledger.html \
            site/agi-alpha-node-v0-manifest.json \
            site/assets/agi-alpha-node-v0.css \
            site/assets/agi-alpha-node-v0.js \
            site/data/agi-alpha-node-v0.json \
            site/downloads/agi-alpha-node-v0/sample-node-evidence-docket.json \
            site/qa/agi-alpha-node-v0-build.json; do
            test -s "$file" || { echo "Missing generated AGI Alpha Node v0 output: $file"; find site -maxdepth 4 -type f | sort; exit 1; }
          done

      - name: Verify preservation and regression-test AGI Alpha Node v0 Sovereign Citadel
        run: |
          python3 scripts/website/verify_agi_alpha_node_v0.py \
            --site site \
            --root . \
            --baseline "$RUNNER_TEMP/agi-alpha-node-v0-prebuild.json" \
            --output site/qa/agi-alpha-node-v0-static.json
          python3 -m unittest discover -s test -p 'test_agi_alpha_node_v0_website.py' -v

      - name: Adversarially browser-test AGI Alpha Node v0 Sovereign Citadel
        run: python3 scripts/website/visual_check_agi_alpha_node_v0.py --site site --output site/qa/agi-alpha-node-v0-browser

      - name: Assert final AGI Alpha Node v0 QA evidence exists
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            site/qa/agi-alpha-node-v0-static.json \
            site/qa/agi-alpha-node-v0-browser/browser-report.json; do
            test -s "$file" || { echo "Missing AGI Alpha Node v0 QA evidence: $file"; exit 1; }
          done

      - name: Re-verify optional META-Agentic manifest after shared-surface reconciliation
        if: env.META_AGENTIC_STATE == 'complete'
        run: python3 scripts/website/verify_meta_agentic_alpha_agi.py --site site

      - name: Record protected flagship digests before First Real Loop
        shell: bash
        run: |
          set -euo pipefail
          protected=(
            site/meta-agentic-alpha-agi.html
            site/meta-agentic-alpha-agi-architecture.html
            site/assets/meta-agentic-alpha-agi.css
            site/assets/meta-agentic-alpha-agi.js
            site/data/meta-agentic-alpha-agi.json
            site/agi-alpha-node-v0.html
            site/agi-alpha-node-v0-architecture.html
            site/agi-alpha-node-v0-proof-ledger.html
            site/assets/agi-alpha-node-v0.css
            site/assets/agi-alpha-node-v0.js
            site/data/agi-alpha-node-v0.json
            site/downloads/agi-alpha-node-v0/sample-node-evidence-docket.json
          )
          present=()
          for file in "${protected[@]}"; do
            [[ -f "$file" ]] && present+=("$file")
          done
          (( ${#present[@]} >= 7 )) || { echo 'Expected flagship outputs are missing before First Real Loop.'; exit 1; }
          sha256sum "${present[@]}" > "$RUNNER_TEMP/prior-flagships.before"

      - name: Build GoalOS AGIALPHA Ascension First Real Loop additively
        run: python3 scripts/website/build_goalos_first_real_loop.py --site site

      - name: Assert First Real Loop generated outputs exist
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            site/first-real-loop.html \
            site/first-real-loop-architecture.html \
            site/first-real-loop-docket.html \
            site/assets/first-real-loop/first-real-loop.css \
            site/assets/first-real-loop/first-real-loop.js \
            site/downloads/first-real-loop/first-real-loop-artifact-ledger.json \
            site/downloads/first-real-loop/first-real-loop-evidence-docket.json \
            site/downloads/first-real-loop/first-real-loop-executive-brief.md \
            site/downloads/first-real-loop/first-real-loop-replay-manifest.json \
            site/index.html \
            site/routes.json \
            site/site-status.json \
            site/sitemap.xml \
            site/qa/first-real-loop-build.json; do
            test -s "$file" || { echo "Missing generated First Real Loop output: $file"; find site -maxdepth 4 -type f | sort; exit 1; }
          done

      - name: Verify, regression-test, and browser-test First Real Loop
        run: |
          python3 scripts/website/verify_goalos_first_real_loop.py \
            --site site \
            --content content/goalos-first-real-loop.json \
            --schema schemas/goalos-first-real-loop-evidence-docket.schema.json
          python3 -m unittest discover -s test -p 'test_goalos_first_real_loop.py' -v
          python3 scripts/website/browser_check_goalos_first_real_loop.py --site site --output site/qa/first-real-loop

      - name: Verify companion manifests against the final shared surfaces
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/website/verify_agi_alpha_node_v0.py \
            --site site \
            --root . \
            --output site/qa/agi-alpha-node-v0-static-post-first-loop.json
          if [[ "${META_AGENTIC_STATE:-none}" == 'complete' ]]; then
            python3 scripts/website/verify_meta_agentic_alpha_agi.py --site site
          fi
          python3 scripts/website/verify_goalos_first_real_loop.py \
            --site site \
            --content content/goalos-first-real-loop.json \
            --schema schemas/goalos-first-real-loop-evidence-docket.schema.json

      - name: Prove protected flagships and canonical source remain byte-identical
        shell: bash
        run: |
          set -euo pipefail
          cut -d' ' -f3- "$RUNNER_TEMP/prior-flagships.before" | while IFS= read -r file; do
            test -s "$file" || { echo "Protected flagship output disappeared: $file"; exit 1; }
          done
          while IFS= read -r line; do
            expected="${line%% *}"
            file="${line#*  }"
            actual="$(sha256sum "$file" | cut -d' ' -f1)"
            [[ "$actual" == "$expected" ]] || { echo "Protected flagship output changed unexpectedly: $file"; exit 1; }
          done < "$RUNNER_TEMP/prior-flagships.before"
          find website/v86_actual_site -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum > "$RUNNER_TEMP/v86-source.after"
          cmp "$RUNNER_TEMP/v86-source.before" "$RUNNER_TEMP/v86-source.after"
          test "$(grep -c 'GOALOS_FIRST_REAL_LOOP_START' site/index.html)" -eq 1
          test "$(grep -c 'GOALOS_FIRST_REAL_LOOP_STYLE_START' site/index.html)" -eq 1

      - name: Snapshot the complete generated institution before AGI Jobs v0 (v2)
        run: python3 scripts/website/snapshot_agi_jobs_v0_v2_site.py --site site --output "$RUNNER_TEMP/agi-jobs-v0-v2-prebuild.json"

      - name: Build GoalOS AGIALPHA Ascension AGI Jobs v0 (v2) additively
        run: SOURCE_DATE_EPOCH=1782259200 python3 scripts/website/build_agi_jobs_v0_v2.py --site site --root .

      - name: Assert AGI Jobs v0 (v2) generated outputs exist
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            site/agi-jobs-v0-v2.html \
            site/agi-jobs-v0-v2-market.html \
            site/agi-jobs-v0-v2-settlement.html \
            site/agi-jobs-v0-v2-memory.html \
            site/agi-jobs-v0-v2-architecture.html \
            site/agi-jobs-v0-v2-manifest.json \
            site/assets/agi-jobs-v0-v2.css \
            site/assets/agi-jobs-v0-v2.js \
            site/data/agi-jobs-v0-v2.json \
            site/downloads/agi-jobs-v0-v2/sample-agi-jobs-evidence-docket.json \
            site/downloads/agi-jobs-v0-v2/agi-jobs-v0-v2-economic-memory.json \
            site/downloads/agi-jobs-v0-v2/agi-jobs-v0-v2-executive-review-brief.md \
            site/qa/agi-jobs-v0-v2-build.json; do
            test -s "$file" || { echo "Missing AGI Jobs v0 (v2) output: $file"; find site -maxdepth 4 -type f | sort; exit 1; }
          done

      - name: Verify preservation and regression-test AGI Jobs v0 (v2)
        run: |
          python3 scripts/website/verify_agi_jobs_v0_v2.py \
            --site site \
            --root . \
            --baseline "$RUNNER_TEMP/agi-jobs-v0-v2-prebuild.json" \
            --schema schemas/agi-jobs-v0-v2-evidence-docket.schema.json \
            --output site/qa/agi-jobs-v0-v2-static.json
          python3 -m unittest discover -s test -p 'test_agi_jobs_v0_v2_website.py' -v

      - name: Adversarially browser-test AGI Jobs v0 (v2)
        run: python3 scripts/website/visual_check_agi_jobs_v0_v2.py --site site --output site/qa/agi-jobs-v0-v2-browser

      - name: Re-verify every companion after AGI Jobs shared-surface reconciliation
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/website/verify_agi_alpha_node_v0.py \
            --site site \
            --root . \
            --output site/qa/agi-alpha-node-v0-static-post-agi-jobs.json
          if [[ "${META_AGENTIC_STATE:-none}" == 'complete' ]]; then
            python3 scripts/website/verify_meta_agentic_alpha_agi.py --site site
          fi
          python3 scripts/website/verify_goalos_first_real_loop.py \
            --site site \
            --content content/goalos-first-real-loop.json \
            --schema schemas/goalos-first-real-loop-evidence-docket.schema.json
          python3 scripts/website/verify_agi_jobs_v0_v2.py \
            --site site \
            --root . \
            --schema schemas/agi-jobs-v0-v2-evidence-docket.schema.json \
            --output site/qa/agi-jobs-v0-v2-static-final.json
          find website/v86_actual_site -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum > "$RUNNER_TEMP/v86-source.after-agi-jobs"
          cmp "$RUNNER_TEMP/v86-source.before" "$RUNNER_TEMP/v86-source.after-agi-jobs"
          test "$(grep -c 'GOALOS_AGI_JOBS_V0_V2_HOME_START' site/index.html)" -eq 1
          test "$(grep -c 'GOALOS_AGI_JOBS_V0_V2_NAV_START' site/index.html)" -eq 1

      - name: Assert final AGI Jobs v0 (v2) QA evidence exists
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            site/qa/agi-jobs-v0-v2-static.json \
            site/qa/agi-jobs-v0-v2-browser/browser-report.json \
            site/qa/agi-jobs-v0-v2-static-final.json; do
            test -s "$file" || { echo "Missing AGI Jobs v0 (v2) QA evidence: $file"; exit 1; }
          done

      - name: Reject archives and private operator material in public site
        shell: bash
        run: |
          set -euo pipefail
          if find site \( -name '*.zip' -o -name '*.7z' -o -name '*.tar' -o -name '*.gz' -o -name '*.rar' \) -print | grep -q .; then
            echo 'Archive file found inside public site. Refusing to publish.'
            exit 1
          fi
          if grep -RIlE 'PRIVATE_MAINNET_DEPLOYER_PRIVATE_KEY|SEED_PHRASE|MNEMONIC|MAINNET_RPC_URL=|ETHERSCAN_API_KEY=' site; then
            echo 'Private operator material found inside public site. Refusing to publish.'
            exit 1
          fi

      - name: Write executive workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo '# GoalOS Ascension Website · Proof Missions + AGIALPHA Sovereign Citadel'
            echo
            echo '- Canonical v86 website source preserved.'
            echo '- Public Proof Missions 001–008 generated in strict dependency order.'
            echo '- Mission 008 restored to the full-bleed sovereign series design.'
            echo '- Ethereum Mainnet deployment record restored at /ethereum-mainnet.html.'
            echo "- Optional META-Agentic release state: ${META_AGENTIC_STATE:-none}."
            echo '- AGI Alpha Node v0 Sovereign Citadel generated at /agi-alpha-node-v0.html.'
            echo '- Sovereign Node Theatre, Constitutional Architecture, and Proof Ledger generated as separate inspectable surfaces.'
            echo '- Deterministic ten-gate proof flight; primary + shadow routes; twelve-peer mesh; seven validators; five guardians; sixteen chained artifacts.'
            echo '- Adversarial incident rehearsals fail closed to SAFE_HOLD; successful flights stop at HUMAN_REVIEW_REQUIRED.'
            echo '- First Real Loop generated at /first-real-loop.html with architecture and Evidence Docket companion surfaces.'
            echo '- Nova-Seed → MARK → Mini Sovereign → five governed jobs → Evidence Docket → capability compiler → vNext replay verified.'
            echo '- First Real Loop terminates at HUMAN_REVIEW_REQUIRED with NONE_GRANTED authority and zero external actions.'
            echo '- Node and META-Agentic manifests reconciled against the final shared website surfaces.'
            echo '- AGI Jobs v0 (v2) Sovereign Labor Civilization generated at /agi-jobs-v0-v2.html.'
            echo '- Market Atlas, Proof Settlement Chamber, Capability Memory Gate, and Constitutional Architecture generated as separate inspectable surfaces.'
            echo '- Fourteen constitutional gates, twelve agent institutions, seven validators, five guardians, and twenty-four chained artifacts verified.'
            echo '- Capability Memory Gate exports review-only economic memory; no capability is promoted autonomously.'
            echo '- Successful cycles stop at HUMAN_SETTLEMENT_REVIEW; adversarial incidents fail closed to SAFE_HOLD.'
            echo '- Live token movements, wallet connections, external actions, and autonomous settlement authorizations: 0.'
            echo '- Mission 006, Mission 007, Mission 008, and Mainnet generated-page preflights passed.'
            echo '- 48 GoalOS-created Mainnet contracts represented.'
            echo '- 48/48 recorded source verification; 0 failures.'
            echo '- No mission result or maturity designation is predeclared.'
            echo '- No wallet, RPC endpoint, API key, or blockchain transaction used.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload human-review preview and QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goalos-public-proof-missions-preview
          path: |
            site/index.html
            site/proof-missions.html
            site/proof-gradient-challenge.html
            site/proof-mission-002.html
            site/proof-mission-003.html
            site/proof-mission-004.html
            site/proof-mission-005.html
            site/proof-mission-006.html
            site/proof-mission-007.html
            site/proof-mission-008.html
            site/ethereum-mainnet.html
            site/agi-alpha-node-v0.html
            site/agi-alpha-node-v0-architecture.html
            site/agi-alpha-node-v0-proof-ledger.html
            site/agi-alpha-node-v0-manifest.json
            site/assets/agi-alpha-node-v0.css
            site/assets/agi-alpha-node-v0.js
            site/data/agi-alpha-node-v0.json
            site/first-real-loop.html
            site/first-real-loop-architecture.html
            site/first-real-loop-docket.html
            site/agi-jobs-v0-v2.html
            site/agi-jobs-v0-v2-market.html
            site/agi-jobs-v0-v2-settlement.html
            site/agi-jobs-v0-v2-memory.html
            site/agi-jobs-v0-v2-architecture.html
            site/agi-jobs-v0-v2-manifest.json
            site/assets/agi-jobs-v0-v2.css
            site/assets/agi-jobs-v0-v2.js
            site/data/agi-jobs-v0-v2.json
            site/downloads/agi-jobs-v0-v2/
            site/assets/first-real-loop/
            site/downloads/first-real-loop/
            site/downloads/agi-alpha-node-v0/
            site/downloads/proof-gradient/
            site/downloads/proof-missions/
            site/qa/
          if-no-files-found: error
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy v86 to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-verify-browser-test
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
