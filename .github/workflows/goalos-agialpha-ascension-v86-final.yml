name: GoalOS AGIALPHA Ascension v87 Mainnet Record — Preserve Actual Website

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'website/v86_actual_site/**'
      - 'config/ethereum-mainnet.contracts.json'
      - 'release/mainnet-2026-06-21/CONTRACTS_MAINNET.json'
      - 'release/mainnet-2026-06-21/RELEASE_MANIFEST.json'
      - 'release/mainnet-2026-06-21/DEPLOYMENT_EVIDENCE.json'
      - 'scripts/build_goalos_agialpha_ascension_website_v86.py'
      - 'scripts/verify_goalos_agialpha_ascension_website_v86.py'
      - 'scripts/visual_layout_check_v86.py'
      - 'scripts/add_goalos_ethereum_mainnet_pages_v87.py'
      - 'scripts/verify_goalos_ethereum_mainnet_pages_v87.py'
      - 'scripts/browser_check_goalos_ethereum_mainnet_v87.py'
      - '.github/workflows/goalos-agialpha-ascension-v86-final.yml'

concurrency:
  group: goalos-agialpha-ascension-v86
  cancel-in-progress: false

permissions: {}

jobs:
  build-verify-browser-test:
    name: Build, preserve, add Mainnet record, verify, and browser-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build preserved actual website
        run: python3 scripts/build_goalos_agialpha_ascension_website_v86.py --out site

      - name: Add Ethereum Mainnet page and homepage status card
        run: |
          python3 scripts/add_goalos_ethereum_mainnet_pages_v87.py \
            --site site \
            --registry config/ethereum-mainnet.contracts.json \
            --release-contracts release/mainnet-2026-06-21/CONTRACTS_MAINNET.json \
            --release-manifest release/mainnet-2026-06-21/RELEASE_MANIFEST.json \
            --deployment-evidence release/mainnet-2026-06-21/DEPLOYMENT_EVIDENCE.json

      - name: Verify preserved content, links, claims, and files
        run: python3 scripts/verify_goalos_agialpha_ascension_website_v86.py --site site

      - name: Verify Ethereum Mainnet page and homepage card
        run: |
          python3 scripts/verify_goalos_ethereum_mainnet_pages_v87.py \
            --site site \
            --registry config/ethereum-mainnet.contracts.json

      - name: Prove canonical v86 source was not modified by the build
        run: git diff --exit-code -- website/v86_actual_site

      - name: Install Playwright Chromium
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Run preserved browser layout and mobile QA
        run: python3 scripts/visual_layout_check_v86.py --site site --screenshots

      - name: Browser-test the new Ethereum Mainnet page
        run: python3 scripts/browser_check_goalos_ethereum_mainnet_v87.py --site site --screenshots

      - name: Reject archives in public site
        run: |
          if find site \( -name '*.zip' -o -name '*.7z' -o -name '*.tar' -o -name '*.gz' -o -name '*.rar' \) -print | grep -q .; then
            echo 'Archive file found inside public site. Refusing to deploy.'
            find site \( -name '*.zip' -o -name '*.7z' -o -name '*.tar' -o -name '*.gz' -o -name '*.rar' \) -print
            exit 1
          fi

      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goalos-v87-mainnet-page-qa-evidence
          path: site/qa

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy preserved v86 site plus v87 Mainnet record
    runs-on: ubuntu-latest
    needs: build-verify-browser-test
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
