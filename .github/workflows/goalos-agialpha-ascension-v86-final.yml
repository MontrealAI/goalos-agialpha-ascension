name: GoalOS AGIALPHA Ascension v86 Preserve Actual Website

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'website/v86_actual_site/**'
      - 'scripts/build_goalos_agialpha_ascension_website_v86.py'
      - 'scripts/verify_goalos_agialpha_ascension_website_v86.py'
      - 'scripts/visual_layout_check_v86.py'
      - 'content/proof-gradient-sovereign.json'
      - 'content/proof-mission-002-ascension-protocol.json'
      - 'content/proof-mission-003-capability-constellation.json'
      - 'content/proof-mission-004-sovereign-institution.json'
      - 'data/mainnet/v4.4.0-mainnet-2026-06-21.json'
      - 'scripts/website/build_proof_gradient_sovereign.py'
      - 'scripts/website/verify_proof_gradient_sovereign.py'
      - 'scripts/website/visual_check_proof_gradient_sovereign.py'
      - 'scripts/website/build_proof_mission_002.py'
      - 'scripts/website/verify_proof_mission_002.py'
      - 'scripts/website/visual_check_proof_mission_002.py'
      - 'scripts/website/build_proof_mission_003.py'
      - 'scripts/website/verify_proof_mission_003.py'
      - 'scripts/website/visual_check_proof_mission_003.py'
      - 'scripts/website/build_proof_mission_004.py'
      - 'scripts/website/verify_proof_mission_004.py'
      - 'scripts/website/visual_check_proof_mission_004.py'
      - 'test/test_proof_gradient_sovereign.py'
      - 'test/test_proof_mission_002.py'
      - 'test/test_proof_mission_003.py'
      - 'test/test_proof_mission_004.py'
      - 'docs/PROOF_GRADIENT_SOVEREIGN_WEBSITE.md'
      - 'docs/PROOF_MISSION_002_ASCENSION_PROTOCOL_WEBSITE.md'
      - 'docs/PROOF_MISSION_003_CAPABILITY_CONSTELLATION_WEBSITE.md'
      - 'docs/PROOF_MISSION_004_SOVEREIGN_INSTITUTION_WEBSITE.md'
      - '.github/workflows/goalos-agialpha-ascension-v86-final.yml'
      - '.github/workflows/goalos-agialpha-ascension-v86-smoke-test.yml'

concurrency:
  group: goalos-agialpha-ascension-v86
  cancel-in-progress: false

permissions: {}

env:
  PYTHONUNBUFFERED: '1'

jobs:
  build-verify-browser-test:
    name: Build, preserve, verify, and browser-test v86
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build preserved actual website
        run: python3 scripts/build_goalos_agialpha_ascension_website_v86.py --out site

      - name: Add Public Proof Mission 001 additively
        run: python3 scripts/website/build_proof_gradient_sovereign.py --site site

      - name: Add Public Proof Mission 002 additively
        run: python3 scripts/website/build_proof_mission_002.py --site site

      - name: Add Public Proof Mission 003 and generate the three-mission hub
        run: python3 scripts/website/build_proof_mission_003.py --site site

      - name: Verify canonical content before Mission 004 promotion
        run: python3 scripts/verify_goalos_agialpha_ascension_website_v86.py --site site

      - name: Verify Public Proof Mission 001
        run: python3 scripts/website/verify_proof_gradient_sovereign.py --site site

      - name: Verify Public Proof Mission 002
        run: python3 scripts/website/verify_proof_mission_002.py --site site

      - name: Verify Public Proof Mission 003 before its Mission 004 horizon is promoted
        run: python3 scripts/website/verify_proof_mission_003.py --site site

      - name: Run Missions 001–003 regression tests
        run: |
          python3 -m unittest discover -s test -p 'test_proof_gradient_sovereign.py' -v
          python3 -m unittest discover -s test -p 'test_proof_mission_002.py' -v
          python3 -m unittest discover -s test -p 'test_proof_mission_003.py' -v

      - name: Install Playwright Chromium
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Run canonical browser layout and mobile QA
        run: python3 scripts/visual_layout_check_v86.py --site site --screenshots

      - name: Run Public Proof Mission 001 browser QA
        run: python3 scripts/website/visual_check_proof_gradient_sovereign.py --site site --screenshots

      - name: Run Public Proof Mission 002 browser QA
        run: python3 scripts/website/visual_check_proof_mission_002.py --site site --screenshots

      - name: Run Public Proof Mission 003 and three-mission hub browser QA
        run: python3 scripts/website/visual_check_proof_mission_003.py --site site --screenshots

      - name: Add Public Proof Mission 004 and generate the four-mission hub additively
        run: python3 scripts/website/build_proof_mission_004.py --site site

      - name: Verify Public Proof Mission 004, all prior missions, and canonical preservation
        run: python3 scripts/website/verify_proof_mission_004.py --site site

      - name: Run Public Proof Mission 004 regression tests
        run: python3 -m unittest discover -s test -p 'test_proof_mission_004.py' -v

      - name: Run Public Proof Mission 004 and four-mission hub browser QA
        run: python3 scripts/website/visual_check_proof_mission_004.py --site site --screenshots

      - name: Reject archives and private operator material in public site
        shell: bash
        run: |
          set -euo pipefail
          if find site \( -name '*.zip' -o -name '*.7z' -o -name '*.tar' -o -name '*.gz' -o -name '*.rar' \) -print | grep -q .; then
            echo 'Archive file found inside public site. Refusing to deploy.'
            exit 1
          fi
          if grep -RIlE 'PRIVATE_MAINNET_DEPLOYER_PRIVATE_KEY|SEED_PHRASE|MNEMONIC|MAINNET_RPC_URL=|ETHERSCAN_API_KEY=' site; then
            echo 'Private operator material found inside public site. Refusing to deploy.'
            exit 1
          fi

      - name: Write executive workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo '# GoalOS Public Proof Missions'
            echo
            echo '- Canonical v86 website source preserved.'
            echo '- Public Proof Missions 001–003 preserved.'
            echo '- Public Proof Mission 004 and the four-mission hub generated additively.'
            echo '- Mission 003 horizon promoted to the published Mission 004 page.'
            echo '- 48 GoalOS-created Mainnet contracts represented.'
            echo '- 48/48 recorded source verification; 0 failures.'
            echo '- 14/14 recorded configuration grants.'
            echo '- No named third-party company or competitor comparison in new public content.'
            echo '- No scientific, transfer, composition, or institutional result is predeclared.'
            echo '- No wallet, RPC endpoint, API key, or blockchain transaction used.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload human-review preview and QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goalos-public-proof-missions-preview
          path: |
            site/index.html
            site/proof-missions.html
            site/proof-gradient-challenge.html
            site/proof-mission-002.html
            site/proof-mission-003.html
            site/proof-mission-004.html
            site/downloads/proof-gradient/
            site/downloads/proof-missions/
            site/qa/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy v86 to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-verify-browser-test
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
