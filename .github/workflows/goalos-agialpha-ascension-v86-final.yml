on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'website/v86_actual_site/**'
      - 'scripts/build_goalos_agialpha_ascension_website_v86.py'
      - 'scripts/verify_goalos_agialpha_ascension_website_v86.py'
      - 'scripts/visual_layout_check_v86.py'
