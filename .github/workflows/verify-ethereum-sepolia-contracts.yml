name: Verify Ethereum Sepolia contracts
on:
  workflow_dispatch:
permissions:
  contents: read
concurrency: verify-ethereum-sepolia-contracts
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm run compile:ci
      - name: Verify from manifest
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          test -n "$ETHERSCAN_API_KEY"
          npm run verify:sepolia:all
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sepolia-verification-evidence
          path: |
            qa/sepolia-contract-verification-evidence.json
            docs/SEPOLIA_CONTRACT_VERIFICATION_REPORT.md
            qa/manual-verification-commands.sepolia.md
