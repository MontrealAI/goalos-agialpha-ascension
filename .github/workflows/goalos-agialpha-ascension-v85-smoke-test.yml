name: GoalOS AGIALPHA Ascension v85 Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "*.html"
      - "assets/**"
      - "downloads/**"
      - "docs/**"
      - "scripts/build_goalos_agialpha_ascension_website_v85.py"
      - "scripts/verify_goalos_agialpha_ascension_website_v85.py"
      - "scripts/visual_layout_check_v85.py"
      - ".github/workflows/goalos-agialpha-ascension-v85-smoke-test.yml"

permissions:
  contents: read

concurrency:
  group: goalos-agialpha-ascension-v85-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Build, verify, and browser-test v85
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QA dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright beautifulsoup4
          python -m playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Build site
        run: python scripts/build_goalos_agialpha_ascension_website_v85.py --out site

      - name: Verify content, links, claims, and files
        run: python scripts/verify_goalos_agialpha_ascension_website_v85.py --site site

      - name: Run browser layout and visual QA
        run: python scripts/visual_layout_check_v85.py --site site

      - name: Reject archives in public site
        shell: bash
        run: |
          if find site -type f \( -iname '*.zip' -o -iname '*.tar' -o -iname '*.gz' -o -iname '*.7z' \) -print | grep -q .; then
            echo "Public site contains an archive." >&2
            exit 1
          fi

      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goalos-v85-smoke-test-evidence
          path: |
            site/qa/**
            docs/*V85*.md
          if-no-files-found: warn
          retention-days: 30
