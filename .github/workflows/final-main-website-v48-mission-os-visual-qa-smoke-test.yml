name: Final Main Website v48 Mission OS Visual QA Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_final_main_website_v48.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v48.py"
      - ".github/workflows/final-main-website-v48-mission-os-visual-qa-smoke-test.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build site
        run: python3 scripts/build_goalos_agialpha_final_main_website_v48.py --out site
      - name: Verify site
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v48.py --site site
      - name: Confirm generated public site contains no zip files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains zip files." >&2
            exit 1
          fi
      - name: Confirm GitHub upload folder contains no zip files
        run: |
          if find .github scripts -name "*.zip" -print | grep -q .; then
            echo "GitHub upload scope contains zip files." >&2
            exit 1
          fi
