name: Main Website Proof Card 010 Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Build baseline site
        run: mkdir -p site && printf '<!doctype html><html><body><main><h1>GoalOS AGIALPHA Ascension</h1></main></body></html>' > site/index.html
      - name: Add Proof Cards 001-010
        run: python3 scripts/add_goalos_agialpha_main_site_proof_cards_v16.py --site site
      - name: Verify Proof Cards 001-010
        run: python3 scripts/verify_goalos_agialpha_main_site_proof_cards_v16.py --site site
