name: Main Website Proof Card 005 Smoke Test
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/add_goalos_agialpha_main_site_proof_cards_v11.py"
      - "scripts/verify_goalos_agialpha_main_site_proof_cards_v11.py"
      - "docs/examples/proof-card-005-*"
      - "data/examples/proof-card-005-*"
      - "evidence/examples/proof-card-005-*"
      - ".github/workflows/main-website-proof-card-005-smoke-test.yml"
jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Build small local copy of current app site
        run: |
          rm -rf site
          mkdir -p site
          if [ -f app/index.html ]; then cp -R app/* site/; else echo '<html><head><title>GoalOS AGIALPHA Ascension</title></head><body><main><h1>GoalOS AGIALPHA Ascension</h1></main></body></html>' > site/index.html; fi
      - name: Add proof cards 001-005 additively
        run: python3 scripts/add_goalos_agialpha_main_site_proof_cards_v11.py --site site
      - name: Verify proof cards 001-005
        run: python3 scripts/verify_goalos_agialpha_main_site_proof_cards_v11.py --site site
