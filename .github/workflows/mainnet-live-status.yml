name: Mainnet live status (read-only)
on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: {node-version: '20'}
      - run: npm ci
      - run: npm run mainnet:live:monitor
        env:
          PRIMARY_MAINNET_RPC_URL: ${{ secrets.PRIMARY_MAINNET_RPC_URL }}
          SECONDARY_MAINNET_RPC_URL: ${{ secrets.SECONDARY_MAINNET_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: mainnet-live-status
          path: qa/mainnet-postdeploy/latest-live-status.json
