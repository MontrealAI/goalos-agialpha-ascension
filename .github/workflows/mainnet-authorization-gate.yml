name: Mainnet Authorization Gate
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run repo:all
      - run: npm run assert:public-status
      - name: Read-only public gate check; no secrets or deployment
        run: npm run mainnet:authorization-check:public
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: mainnet-authorization-decision
          path: |
            docs/MAINNET_AUTHORIZATION_DECISION.*
            docs/ETHEREUM_MAINNET_AUTHORIZATION_DECISION.*
