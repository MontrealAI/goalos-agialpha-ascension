name: Mainnet Authorization Gate
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Assert public status remains bounded
        run: python scripts/assert_public_status.py
      - name: No private operator data in public repo
        run: python scripts/no_private_operator_data_check.py
      - name: Read-only public gate check; no install, secrets, or deployment
        run: python scripts/mainnet-authorization-check.py --public-only
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: mainnet-authorization-decision
          path: |
            docs/MAINNET_AUTHORIZATION_DECISION.*
            docs/ETHEREUM_MAINNET_AUTHORIZATION_DECISION.*
