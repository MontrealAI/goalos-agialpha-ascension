name: Mainnet Authorization Gate
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Assert public status remains bounded
        run: python scripts/assert_public_status.py
      - name: Read-only gate check; no install and no deployment
        run: python scripts/mainnet-authorization-check.py
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: mainnet-authorization-decision
          path: docs/MAINNET_AUTHORIZATION_DECISION.*
