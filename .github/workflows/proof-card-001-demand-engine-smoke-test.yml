name: Proof Card 001 Demand Engine Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docs/examples/**"
      - "data/examples/**"
      - "scripts/add_goalos_agialpha_proof_card_001_to_site.py"
      - "scripts/build_existing_site_with_proof_card_001.py"
      - "scripts/build_goalos_agialpha_final_main_website_v46.py"
      - "scripts/verify_goalos_agialpha_proof_card_001_site.py"
      - ".github/workflows/proof-card-001-demand-engine-smoke-test.yml"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build current site and add Proof Card 001 demand engine
        run: python3 scripts/build_existing_site_with_proof_card_001.py --out site
      - name: Verify generated site
        run: python3 scripts/verify_goalos_agialpha_proof_card_001_site.py
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: proof-card-001-demand-engine-site
          path: site
