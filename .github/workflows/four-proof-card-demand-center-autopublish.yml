name: Four Proof Card Demand Center Autopublish

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/build_goalos_agialpha_four_proof_card_site_v9.py"
      - "scripts/verify_goalos_agialpha_four_proof_card_site_v9.py"
      - "docs/examples/**"
      - "data/examples/**"
      - "evidence/examples/**"
      - ".github/workflows/four-proof-card-demand-center-autopublish.yml"

concurrency:
  group: four-proof-card-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify four proof card demand center
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build four proof card demand center
        run: python3 scripts/build_goalos_agialpha_four_proof_card_site_v9.py --out site
      - name: Verify website before deployment
        run: python3 scripts/verify_goalos_agialpha_four_proof_card_site_v9.py --site site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy four proof card demand center to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
