name: Autonomous Ascension Website v80

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/build_goalos_agialpha_ascension_website_v80.py"
      - "scripts/verify_goalos_agialpha_ascension_website_v80.py"
      - "website/**"
      - "assets/**"
      - "docs/**"
      - ".github/workflows/autonomous-ascension-website-v80.yml"
      - ".github/workflows/ascension-website-v80-smoke-test.yml"

concurrency:
  group: goalos-ascension-website-v80
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build and verify Complete Platinum Ascension website v80
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Install optional PDF preview renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      - name: Build website
        run: python3 scripts/build_goalos_agialpha_ascension_website_v80.py --out site
      - name: Verify website
        run: python3 scripts/verify_goalos_agialpha_ascension_website_v80.py --site site
      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files." >&2
            exit 1
          fi
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    name: Deploy Complete Platinum Ascension website v80
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
