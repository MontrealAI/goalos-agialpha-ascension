name: Final Main Website v66 Proof Treasury Simulation 003 Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_final_main_website_v66.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v66.py"
      - ".github/workflows/final-main-website-v66-proof-treasury-sim-003-smoke-test.yml"
      - "docs/papers/mission-os/**"
      - "evidence/mission-os/proof-treasury-simulation-003/**"
      - "data/proof-treasury-simulation-003/**"
      - "examples/mission-os/proof-treasury-simulation-003.json"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build site
        run: python3 scripts/build_goalos_agialpha_final_main_website_v66.py --out site
      - name: Verify site
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v66.py --site site
      - name: Confirm generated public site contains no ZIP files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains ZIP files."; exit 1
          fi
