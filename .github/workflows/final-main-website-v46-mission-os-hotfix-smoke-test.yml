name: Final Main Website v46 Mission OS Hotfix Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_goalos_agialpha_final_main_website_v46.py"
      - "scripts/verify_goalos_agialpha_final_main_website_v46.py"
      - ".github/workflows/final-main-website-v46-mission-os-hotfix-smoke-test.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build site
        run: python3 scripts/build_goalos_agialpha_final_main_website_v46.py --out site
      - name: Verify site
        run: python3 scripts/verify_goalos_agialpha_final_main_website_v46.py --site site
      - name: Confirm upload folder contains no zip files
        run: |
          if find .github scripts -name "*.zip" -print | grep -q .; then
            echo "GitHub upload folder contains zip files."
            exit 1
          fi
      - name: Confirm generated public site contains no zip files
        run: |
          if find site -name "*.zip" -print | grep -q .; then
            echo "Generated public site contains zip files."
            exit 1
          fi
