name: Main Website Proof Card 015 v29 Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "site-assets/proof-pages/**"
      - "data/proof-cards/**"
      - "data/examples/**"
      - "docs/examples/**"
      - "evidence/examples/**"
      - "scripts/integrate_goalos_agialpha_proof_card_015_v29.py"
      - "scripts/verify_goalos_agialpha_proof_card_015_v29.py"
      - ".github/workflows/main-website-proof-card-015-v29-smoke-test.yml"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Create minimal site shell
        run: |
          mkdir -p site
          printf '<!doctype html><html><body><main><h1>GoalOS AGIALPHA Ascension</h1></main></body></html>' > site/index.html
      - name: Integrate Proof Card 015
        run: python3 scripts/integrate_goalos_agialpha_proof_card_015_v29.py --site site
      - name: Verify Proof Cards 001-015
        run: python3 scripts/verify_goalos_agialpha_proof_card_015_v29.py --site site
