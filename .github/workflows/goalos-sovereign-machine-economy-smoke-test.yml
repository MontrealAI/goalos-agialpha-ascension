name: GoalOS AGIALPHA Ascension Sovereign Machine Economy Ω Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'content/sovereign-machine-economy.json'
      - 'schemas/sovereign-machine-economy-docket.schema.json'
      - 'website/features/sovereign-machine-economy/**'
      - 'scripts/website/build_sovereign_machine_economy.py'
      - 'scripts/website/snapshot_sovereign_machine_economy_site.py'
      - 'scripts/website/verify_sovereign_machine_economy.py'
      - 'scripts/website/visual_check_sovereign_machine_economy.py'
      - 'test/test_sovereign_machine_economy_website.py'
      - 'docs/SOVEREIGN_MACHINE_ECONOMY_WEBSITE.md'
      - 'README_UPLOAD_SOVEREIGN_MACHINE_ECONOMY.md'
      - '.github/workflows/goalos-sovereign-machine-economy-smoke-test.yml'
      - '.github/workflows/goalos-agialpha-ascension-v86-final.yml'

concurrency:
  group: goalos-sovereign-machine-economy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: '1'

jobs:
  build-verify-browser-test:
    name: Build every engine, preserve every flagship, and verify the constitutional civilization
    runs-on: ubuntu-latest
    timeout-minutes: 125
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Assert the three constitutional engines and integration source are complete
        shell: bash
        run: |
          set -euo pipefail
          required=(
            content/meta-agentic-alpha-agi.json
            content/agi-alpha-node-v0.json
            content/agi-jobs-v0-v2.json
            content/sovereign-machine-economy.json
            website/features/meta-agentic-alpha-agi/assets/meta-agentic-alpha-agi.js
            website/features/agi-alpha-node-v0/assets/agi-alpha-node-v0.js
            website/features/agi-jobs-v0-v2/assets/agi-jobs-v0-v2.js
            website/features/sovereign-machine-economy/assets/sovereign-machine-economy.js
            scripts/website/build_meta_agentic_alpha_agi.py
            scripts/website/build_agi_alpha_node_v0.py
            scripts/website/build_agi_jobs_v0_v2.py
            scripts/website/build_sovereign_machine_economy.py
          )
          for file in "${required[@]}"; do
            test -s "$file" || { echo "Missing or empty constitutional prerequisite: $file"; exit 1; }
          done
      - name: Compile required constitutional-civilization tooling under Python 3.11
        run: |
          python3 -m py_compile \
            scripts/website/build_meta_agentic_alpha_agi.py \
            scripts/website/verify_meta_agentic_alpha_agi.py \
            scripts/website/visual_check_meta_agentic_alpha_agi.py \
            scripts/website/build_agi_alpha_node_v0.py \
            scripts/website/snapshot_agi_alpha_node_v0_site.py \
            scripts/website/verify_agi_alpha_node_v0.py \
            scripts/website/visual_check_agi_alpha_node_v0.py \
            scripts/website/build_agi_jobs_v0_v2.py \
            scripts/website/snapshot_agi_jobs_v0_v2_site.py \
            scripts/website/verify_agi_jobs_v0_v2.py \
            scripts/website/visual_check_agi_jobs_v0_v2.py \
            scripts/website/build_sovereign_machine_economy.py \
            scripts/website/snapshot_sovereign_machine_economy_site.py \
            scripts/website/verify_sovereign_machine_economy.py \
            scripts/website/visual_check_sovereign_machine_economy.py
      - name: Parse required constitutional-civilization runtimes under Node.js
        run: |
          node --check website/features/meta-agentic-alpha-agi/assets/meta-agentic-alpha-agi.js
          node --check website/features/agi-alpha-node-v0/assets/agi-alpha-node-v0.js
          node --check website/features/agi-jobs-v0-v2/assets/agi-jobs-v0-v2.js
          node --check website/features/sovereign-machine-economy/assets/sovereign-machine-economy.js
      - name: Detect, validate, and compile optional First Real Loop
        shell: bash
        run: |
          set -euo pipefail
          required=(
            content/goalos-first-real-loop.json
            website/first_real_loop/first-real-loop.css
            website/first_real_loop/first-real-loop.js
            scripts/website/build_goalos_first_real_loop.py
            scripts/website/verify_goalos_first_real_loop.py
            scripts/website/browser_check_goalos_first_real_loop.py
            schemas/goalos-first-real-loop-evidence-docket.schema.json
            test/test_goalos_first_real_loop.py
          )
          present=0
          for file in "${required[@]}"; do
            [[ -s "$file" ]] && present=$((present + 1))
          done
          if (( present == 0 )); then
            state=none
          elif (( present == ${#required[@]} )); then
            state=complete
            python3 -m py_compile \
              scripts/website/build_goalos_first_real_loop.py \
              scripts/website/verify_goalos_first_real_loop.py \
              scripts/website/browser_check_goalos_first_real_loop.py
            node --check website/first_real_loop/first-real-loop.js
          else
            echo "Partial First Real Loop installation detected ($present/${#required[@]} required files). Refusing a mixed release."
            printf 'Required: %s\n' "${required[@]}"
            exit 1
          fi
          echo "FIRST_REAL_LOOP_STATE=$state" >> "$GITHUB_ENV"
          echo "First Real Loop release state: $state"
      - name: Install schema and browser QA dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install jsonschema playwright
          python3 -m playwright install --with-deps chromium

      - name: Record canonical v86 source digest
        shell: bash
        run: |
          set -euo pipefail
          find website/v86_actual_site -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum > "$RUNNER_TEMP/v86-source.before"

      - name: Build the preserved website, eight Proof Missions, and Mainnet record
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/build_goalos_agialpha_ascension_website_v86.py --out site
          python3 scripts/website/build_proof_gradient_sovereign.py --site site
          python3 scripts/website/build_proof_mission_002.py --site site
          python3 scripts/website/build_proof_mission_003.py --site site
          python3 scripts/website/build_proof_mission_004.py --site site
          python3 scripts/website/build_proof_mission_005.py --site site
          python3 scripts/website/build_proof_mission_006.py --site site
          python3 scripts/website/build_proof_mission_007.py --site site
          python3 scripts/website/build_proof_mission_008.py --site site
          python3 scripts/add_goalos_ethereum_mainnet_pages_v87.py \
            --site site \
            --registry config/ethereum-mainnet.contracts.json \
            --release-contracts release/mainnet-2026-06-21/CONTRACTS_MAINNET.json \
            --release-manifest release/mainnet-2026-06-21/RELEASE_MANIFEST.json \
            --deployment-evidence release/mainnet-2026-06-21/DEPLOYMENT_EVIDENCE.json

      - name: Rebuild, verify, and browser-test META-Agentic α-AGI
        run: |
          SOURCE_DATE_EPOCH=1782172800 python3 scripts/website/build_meta_agentic_alpha_agi.py --site site
          python3 scripts/website/verify_meta_agentic_alpha_agi.py --site site
          python3 -m unittest discover -s test -p 'test_meta_agentic_alpha_agi_website.py' -v
          python3 scripts/website/visual_check_meta_agentic_alpha_agi.py --site site --output site/qa/meta-agentic-alpha-agi

      - name: Rebuild, verify, and browser-test AGI Alpha Node v0
        run: |
          python3 scripts/website/snapshot_agi_alpha_node_v0_site.py --site site --output "$RUNNER_TEMP/agi-alpha-node-v0-prebuild.json"
          SOURCE_DATE_EPOCH=1782216000 python3 scripts/website/build_agi_alpha_node_v0.py --site site --root .
          python3 scripts/website/verify_agi_alpha_node_v0.py \
            --site site \
            --root . \
            --baseline "$RUNNER_TEMP/agi-alpha-node-v0-prebuild.json" \
            --output site/qa/agi-alpha-node-v0-static.json
          python3 -m unittest discover -s test -p 'test_agi_alpha_node_v0_website.py' -v
          python3 scripts/website/visual_check_agi_alpha_node_v0.py --site site --output site/qa/agi-alpha-node-v0-browser

      - name: Rebuild, verify, and browser-test optional First Real Loop
        if: env.FIRST_REAL_LOOP_STATE == 'complete'
        run: |
          python3 scripts/website/build_goalos_first_real_loop.py --site site
          python3 scripts/website/verify_goalos_first_real_loop.py \
            --site site \
            --content content/goalos-first-real-loop.json \
            --schema schemas/goalos-first-real-loop-evidence-docket.schema.json
          python3 -m unittest discover -s test -p 'test_goalos_first_real_loop.py' -v
          python3 scripts/website/browser_check_goalos_first_real_loop.py --site site --output site/qa/first-real-loop
      - name: Rebuild, verify, and browser-test AGI Jobs v0 (v2)
        run: |
          python3 scripts/website/snapshot_agi_jobs_v0_v2_site.py --site site --output "$RUNNER_TEMP/agi-jobs-v0-v2-prebuild.json"
          SOURCE_DATE_EPOCH=1782259200 python3 scripts/website/build_agi_jobs_v0_v2.py --site site --root .
          python3 scripts/website/verify_agi_jobs_v0_v2.py \
            --site site \
            --root . \
            --baseline "$RUNNER_TEMP/agi-jobs-v0-v2-prebuild.json" \
            --schema schemas/agi-jobs-v0-v2-evidence-docket.schema.json \
            --output site/qa/agi-jobs-v0-v2-static.json
          python3 -m unittest discover -s test -p 'test_agi_jobs_v0_v2_website.py' -v
          python3 scripts/website/visual_check_agi_jobs_v0_v2.py --site site --output site/qa/agi-jobs-v0-v2-browser

      - name: Snapshot the complete institution before the constitutional integration
        run: python3 scripts/website/snapshot_sovereign_machine_economy_site.py --site site --output "$RUNNER_TEMP/sovereign-machine-economy-prebuild.json"

      - name: Build, verify, and browser-test Sovereign Machine Economy
        run: |
          SOURCE_DATE_EPOCH=1782259200 python3 scripts/website/build_sovereign_machine_economy.py --site site --root .
          python3 scripts/website/verify_sovereign_machine_economy.py \
            --site site \
            --root . \
            --content content/sovereign-machine-economy.json \
            --schema schemas/sovereign-machine-economy-docket.schema.json \
            --baseline "$RUNNER_TEMP/sovereign-machine-economy-prebuild.json" \
            --output site/qa/sovereign-machine-economy-static.json
          python3 -m unittest discover -s test -p 'test_sovereign_machine_economy_website.py' -v
          python3 scripts/website/visual_check_sovereign_machine_economy.py --site site --output site/qa/sovereign-machine-economy-browser

      - name: Re-verify every constitutional engine against the final shared surfaces
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/website/verify_meta_agentic_alpha_agi.py --site site
          python3 scripts/website/verify_agi_alpha_node_v0.py \
            --site site \
            --root . \
            --output site/qa/agi-alpha-node-v0-static-post-machine-economy.json
          if [[ "${FIRST_REAL_LOOP_STATE:-none}" == 'complete' ]]; then
            python3 scripts/website/verify_goalos_first_real_loop.py \
              --site site \
              --content content/goalos-first-real-loop.json \
              --schema schemas/goalos-first-real-loop-evidence-docket.schema.json
          fi
          python3 scripts/website/verify_agi_jobs_v0_v2.py \
            --site site \
            --root . \
            --schema schemas/agi-jobs-v0-v2-evidence-docket.schema.json \
            --output site/qa/agi-jobs-v0-v2-static-post-machine-economy.json
          python3 scripts/website/verify_sovereign_machine_economy.py \
            --site site \
            --root . \
            --content content/sovereign-machine-economy.json \
            --schema schemas/sovereign-machine-economy-docket.schema.json \
            --output site/qa/sovereign-machine-economy-static-final.json
      - name: Prove a second integration build is byte-identical
        shell: bash
        run: |
          set -euo pipefail
          find site -type f -print0 | sort -z | xargs -0 sha256sum > "$RUNNER_TEMP/site.before-second-build"
          SOURCE_DATE_EPOCH=1782259200 python3 scripts/website/build_sovereign_machine_economy.py --site site --root .
          find site -type f -print0 | sort -z | xargs -0 sha256sum > "$RUNNER_TEMP/site.after-second-build"
          cmp "$RUNNER_TEMP/site.before-second-build" "$RUNNER_TEMP/site.after-second-build"

      - name: Prove canonical-source preservation and public-site hygiene
        shell: bash
        run: |
          set -euo pipefail
          find website/v86_actual_site -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum > "$RUNNER_TEMP/v86-source.after"
          cmp "$RUNNER_TEMP/v86-source.before" "$RUNNER_TEMP/v86-source.after"
          test "$(grep -c 'GOALOS_SOVEREIGN_MACHINE_ECONOMY_HOME_START' site/index.html)" -eq 1
          test "$(grep -c 'GOALOS_SOVEREIGN_MACHINE_ECONOMY_NAV_START' site/index.html)" -eq 1
          if find site \( -name '*.zip' -o -name '*.7z' -o -name '*.tar' -o -name '*.gz' -o -name '*.rar' \) -print | grep -q .; then
            echo 'Archive file found inside public site. Refusing preview.'
            exit 1
          fi
          if grep -RIlE 'PRIVATE_MAINNET_DEPLOYER_PRIVATE_KEY|SEED_PHRASE|MNEMONIC|MAINNET_RPC_URL=|ETHERSCAN_API_KEY=' site; then
            echo 'Private operator material found inside public site. Refusing preview.'
            exit 1
          fi

      - name: Write Sovereign Machine Economy summary
        if: always()
        shell: bash
        run: |
          {
            echo '# GoalOS AGIALPHA Ascension Sovereign Machine Economy Ω'
            echo
            echo '- META-Agentic α-AGI, AGI Alpha Node v0, and AGI Jobs v0 (v2) rebuilt as one inspectable constitutional civilization engine.'
            echo '- Python 3.11 and Node.js syntax gates passed before the build.'
            echo '- Three engines, twenty-one proof gates, fifteen typed handoffs, and forty-eight predecessor-linked evidence artifacts verified.'
            echo '- Three governed counterfactual universes, one Mission Passport, and four local Human Review Chamber dispositions verified.'
            echo '- Successful completion stops at HUMAN_SETTLEMENT_REVIEW; adversarial scenarios fail closed.'
            echo '- External authority, live settlement, wallet connections, network requests, automatic memory promotion, and external actions: 0.'
            echo '- Every companion manifest and the canonical v86 source boundary remained valid.'
            echo '- A second installed integration build was byte-identical.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Sovereign Machine Economy preview and QA evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: goalos-sovereign-machine-economy-preview
          path: |
            site/index.html
            site/routes.json
            site/sitemap.xml
            site/site-status.json
            site/sovereign-machine-economy.html
            site/sovereign-machine-economy-observatory.html
            site/sovereign-machine-economy-architecture.html
            site/sovereign-machine-economy-ledger.html
            site/sovereign-machine-economy-memory.html
            site/sovereign-machine-economy-passport.html
            site/sovereign-machine-economy-manifest.json
            site/assets/sovereign-machine-economy.css
            site/assets/sovereign-machine-economy.js
            site/data/sovereign-machine-economy.json
            site/downloads/sovereign-machine-economy/
            site/qa/sovereign-machine-economy-build.json
            site/qa/sovereign-machine-economy-static.json
            site/qa/sovereign-machine-economy-static-final.json
            site/qa/sovereign-machine-economy-browser/
            site/qa/agi-alpha-node-v0-static-post-machine-economy.json
            site/qa/agi-jobs-v0-v2-static-post-machine-economy.json
            site/qa/meta-agentic-alpha-agi/
            site/qa/agi-alpha-node-v0-browser/
            site/qa/first-real-loop/
            site/qa/agi-jobs-v0-v2-browser/
          if-no-files-found: warn
          retention-days: 30
