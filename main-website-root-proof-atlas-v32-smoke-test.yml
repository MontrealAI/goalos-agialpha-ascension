name: Main Website Root Proof Atlas v32 Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "site-assets/proof-pages/**"
      - "data/proof-cards/**"
      - "scripts/integrate_goalos_agialpha_main_website_root_v32.py"
      - "scripts/verify_goalos_agialpha_main_website_root_v32.py"
      - ".github/workflows/main-website-root-proof-atlas-v32-smoke-test.yml"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build fallback main website locally
        run: |
          mkdir -p site
          cp site-assets/proof-pages/index.html site/index.html
          python3 scripts/integrate_goalos_agialpha_main_website_root_v32.py --site site
      - name: Verify main website root proof atlas
        run: python3 scripts/verify_goalos_agialpha_main_website_root_v32.py --site site
