[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules"]
test = "test/foundry"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
fs_permissions = [{ access = "read", path = "./" }]

[rpc_endpoints]
mainnet = "${ETHEREUM_MAINNET_RPC_URL}"
sepolia = "${ETHEREUM_SEPOLIA_RPC_URL}"
