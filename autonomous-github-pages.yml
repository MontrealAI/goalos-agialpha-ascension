name: Premium Autonomous GitHub Pages Website

on:
  push:
    branches: [ main ]
    paths:
      - "README.md"
      - "docs/**"
      - "qa/**"
      - "audit/**"
      - "deployments/**"
      - "package.json"
      - ".github/workflows/autonomous-github-pages.yml"
      - "site-assets/proof-pages/**"
      - "data/proof-cards/**"
      - "scripts/integrate_goalos_agialpha_main_website_root_v32.py"
      - "scripts/verify_goalos_agialpha_main_website_root_v32.py"
  workflow_dispatch:

concurrency:
  group: premium-autonomous-github-pages
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build premium autonomous website
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build existing premium website if builder exists
        shell: bash
        run: |
          set -e
          if [ -f scripts/build_premium_autonomous_website.py ]; then
            python3 scripts/build_premium_autonomous_website.py --out site
          elif [ -f scripts/build_website.py ]; then
            python3 scripts/build_website.py --out site
          elif [ -f site/index.html ]; then
            echo "Existing site/ directory found."
          else
            mkdir -p site
            cp site-assets/proof-pages/index.html site/index.html
          fi
      - name: Integrate Proof Card Atlas into main website root
        shell: bash
        run: python3 scripts/integrate_goalos_agialpha_main_website_root_v32.py --site site
      - name: Verify main website root and proof cards before deployment
        shell: bash
        run: python3 scripts/verify_goalos_agialpha_main_website_root_v32.py --site site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    name: Deploy premium website to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
